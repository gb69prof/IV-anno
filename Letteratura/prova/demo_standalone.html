jY4MCIgdGV4dC1hbmNob3I9ImVuZCIgZm9udC1mYW1pbHk9IkFyaWFsLCBzYW5zLXNlcmlmIiBmb250LXNpemU9IjE4IiBmaWxsPSIjNWU2YzY5Ij5Db3JwdXMgZ2Jwcm9mIMK3IGEgY3VyYSBkaSBnYnByb2YgZSBMaWJlcmE8L3RleHQ+PC9zdmc+"}}, {"id": "italiano-unita-2-milano-e-il-laboratorio-del-caffe", "title": "Unità 2 · Milano e il laboratorio del Caffè", "kind": "main", "body": "<h2>5. L’Accademia dei Pugni</h2>\n<p>All’inizio degli anni Sessanta un gruppo di giovani aristocratici e intellettuali milanesi si riunì intorno a Pietro Verri. Ne facevano parte, fra gli altri, Alessandro Verri, Cesare Beccaria, Luigi Lambertenghi, Alfonso Longo e Paolo Frisi. Il nome <strong>Accademia dei Pugni</strong> esprimeva ironicamente il carattere combattivo delle discussioni e la distanza dalle accademie erudite tradizionali.</p>\n<p>Il gruppo non aveva una dottrina uniforme. Condivideva però insofferenza verso il pedantismo, interesse per i problemi economici e giuridici, lettura dei philosophes francesi e dei periodici inglesi, desiderio di incidere sulla società lombarda. Pietro Verri ne fu l’organizzatore più energico; Beccaria trovò nell’ambiente dei Pugni lo stimolo decisivo per la redazione di <em>Dei delitti e delle pene</em>.</p>\n<p>La vivacità del gruppo non impedì conflitti personali. Il viaggio di Beccaria e Alessandro Verri a Parigi nel 1766 coincise con la conclusione dell’esperienza. Negli anni successivi si consumò anche la rottura fra Beccaria e Pietro Verri. La brevità del sodalizio non ne riduce l’importanza: in pochi anni produsse un periodico innovativo e un classico europeo del diritto.</p>\n<aside class=\"callout profile\"><span class=\"callout-label\">Scheda Una Nuova Accademia</span><p>I Pugni non rifiutano lo studio: rifiutano una cultura che parla soltanto a se stessa. L’accademia diventa un’officina di progetti, scritture e polemiche rivolte al presente.</p></aside>\n<h2>6. Come funziona <em>Il Caffè</em></h2>\n<p><em>Il Caffè</em> uscì dal giugno 1764 al maggio 1766. I fogli venivano pubblicati ogni dieci giorni e furono poi raccolti in due tomi, per un totale di settantaquattro numeri. Il titolo richiama il luogo simbolico della conversazione moderna: nel caffè immaginario di Demetrio persone diverse discutono liberamente di economia, morale, scienza, lingua e costumi.</p>\n<p>Il modello era il periodico britannico <em>The Spectator</em>, ma il giornale milanese elaborò una forma propria. Alternava articoli argomentativi, lettere, dialoghi, racconti, personaggi fittizi, memoriali polemici, satire e interventi tecnici. La varietà permetteva di raggiungere lettori non specialisti e di trasformare questioni astratte in situazioni riconoscibili.</p>\n<p>Il periodico non proponeva una semplice raccolta di opinioni. Costruiva un pubblico. Il lettore era immaginato come persona curiosa, disponibile a ragionare e capace di modificare gradualmente giudizi e comportamenti. Nel testo <em>De’ fogli periodici</em> Beccaria spiega che il foglio breve raggiunge chi sarebbe spaventato dalla mole di un libro, parla quasi all’orecchio e diffonde le idee un poco alla volta.</p>\n<p>La brevità non significa superficialità. Impone selezione, chiarezza e capacità di attrarre. Il tono conversativo evita la lezione solenne; l’ironia colpisce pregiudizi e abitudini senza trasformare ogni intervento in un sermone. La letteratura diventa così una pratica civile.</p>\n<aside class=\"callout anthology\"><span class=\"callout-label\">Rimando Antologico</span><p>Cesare Beccaria, De’ fogli periodici: il programma del nuovo giornalismo e la costruzione del lettore moderno.</p></aside>\n<h2>7. Idee prima delle parole: la polemica contro la Crusca</h2>\n<p>La battaglia linguistica del <em>Caffè</em> è espressa con particolare forza nella <em>Rinunzia avanti notaio al Vocabolario della Crusca</em>, attribuita ad Alessandro Verri. Il testo imita scherzosamente un atto notarile e dichiara la volontà di rinunciare all’autorità esclusiva del vocabolario. Il bersaglio non è la lingua italiana, ma l’idea che la correttezza consista nel riprodurre soltanto parole e usi consacrati dagli scrittori antichi.</p>\n<p>I milanesi rivendicano la possibilità di creare termini, accogliere forestierismi e modificare la lingua quando le idee nuove lo richiedono. Economia, scienza, diritto e amministrazione hanno bisogno di un lessico che la tradizione letteraria non sempre possiede. “Preferire le idee alle parole” significa subordinare la norma linguistica alla comunicazione e all’utilità.</p>\n<p>La polemica contiene un’apparente contraddizione. Per combattere il purismo, Alessandro Verri usa una forma letteraria raffinata, ricca di ironia e parodia. Ciò dimostra che i collaboratori del <em>Caffè</em> non vogliono abolire lo stile. Vogliono sostituire allo stile come ornamento uno stile come azione efficace sul lettore.</p>\n<p>Nel <em>Frammento sullo stile</em> Beccaria collega il discorso alla successione delle idee e cerca un equilibrio fra ordine, uso, suono ed energia. La chiarezza non è una rinuncia alla forma: è la capacità di rendere percepibile il movimento del pensiero.</p>\n<aside class=\"callout warning\"><span class=\"callout-label\">Errore Da Evitare</span><p>L’anticruscantesimo non è disprezzo dell’italiano. È il progetto di una lingua nazionale capace di parlare della società contemporanea e di comunicare i nuovi saperi.</p></aside>\n<h2>8. Utilità e pubblica felicità</h2>\n<p>Il lessico del <em>Caffè</em> ruota intorno all’utilità sociale del sapere. Nell’articolo <em>Gli studi utili</em>, Luigi Lambertenghi giudica le discipline non dal prestigio delle corporazioni, ma dal contributo che offrono alla società. La domanda fondamentale non è “quale studio è più nobile?”, bensì “quale conoscenza migliora concretamente la vita comune?”.</p>\n<p>Pietro Verri aveva espresso un’idea analoga nelle <em>Meditazioni sulla felicità</em> del 1763. La pubblica felicità consiste, nella sua formulazione, nella maggiore felicità possibile distribuita con la maggiore uguaglianza possibile. Il criterio permette di giudicare fiscalità, economia, leggi e amministrazione sulla base degli effetti prodotti sugli esseri umani.</p>\n<p>Questa concezione non elimina le distanze sociali e non fonda una democrazia moderna. Offre però un nuovo metro di valutazione: un’istituzione non è giusta perché antica o autorizzata, ma perché contribuisce al benessere collettivo. L’economia politica diventa per Verri scienza della forza dello Stato e della condizione dei cittadini.</p>\n<aside class=\"callout keyword\"><span class=\"callout-label\">Parola Chiave Pubblica Felicità</span><p>Il benessere collettivo assunto come fine del governo. Non è la somma meccanica delle felicità private: riguarda istituzioni, distribuzione delle risorse e possibilità concrete di vivere meglio.</p></aside>", "tools": {"summary": "L’Accademia dei Pugni e Il Caffè costruiscono una nuova comunicazione civile: periodica, breve, ironica e rivolta a lettori non specialisti. La battaglia contro il purismo chiede una lingua capace di esprimere i nuovi saperi; l’utilità e la pubblica felicità diventano criteri di giudizio.", "essentials": ["I Pugni sono un’officina di discussione, non un’accademia erudita tradizionale.", "Il Caffè costruisce il proprio pubblico.", "La brevità richiede selezione e chiarezza, non superficialità.", "L’anticruscantesimo vuole modernizzare l’italiano.", "La pubblica felicità misura gli effetti delle istituzioni."], "vocab": [["Accademia dei Pugni", "Gruppo milanese raccolto intorno a Pietro Verri."], ["Periodico", "Pubblicazione seriale che crea un rapporto continuativo con il lettore."], ["Anticruscantesimo", "Critica del purismo e dell’autorità esclusiva della Crusca."], ["Utilità", "Capacità di una conoscenza di migliorare la vita sociale."], ["Pubblica felicità", "Benessere collettivo assunto come fine del governo."]], "anthology": [["Cesare Beccaria", "De’ fogli periodici", "Il programma del nuovo giornalismo", "Spiega come la forma breve costrui ll’Accademia dei Pugni. L’opera apparve anonima a Livorno nel 1764 e conobbe una rapidissima fortuna europea. La sua forza dipende non soltanto dalle tesi, ma dalla forma: un testo breve, serrato, privo dell’apparato erudito tradizionale, capace di unire ragionamento, immagini e indignazione controllata.</p>\n<p>Beccaria parte dal patto sociale. Gli individui cedono soltanto la minima porzione di libertà necessaria alla sicurezza comune; nessun potere può quindi infliggere sofferenze non necessarie. La pena non serve a vendicare un’offesa già avvenuta, ma a impedire nuovi delitti. Deve essere stabilita dalla legge, proporzionata, tempestiva e certa.</p>\n<p>La certezza di una pena moderata è più efficace della paura di una pena atroce ma incerta. L’eccessiva crudeltà può rendere gli uomini più insensibili e favorire l’arbitrio. La tortura è irrazionale: viene applicata prima della condanna e trasforma la resistenza fisica in criterio di verità. Il robusto può essere assolto benché colpevole; il debole confessare benché innocente.</p>\n<p>Beccaria rifiuta anche la pena di morte in condizioni normali. Se il patto sociale nasce dalla cessione della minima libertà necessaria, nessuno può aver trasferito allo Stato il diritto di ucciderlo. Inoltre l’esecuzione offre uno spettacolo momentaneo, mentre una pena durevole può avere maggiore efficacia preventiva.</p>\n<p>La ricezione europea trasformò il giovane autore in una celebrità. L’opera fu tradotta, discussa e contestata. Non abolì da sola tortura e pena capitale, ma fornì un linguaggio nuovo ai riformatori e costrinse il diritto penale a giustificare razionalmente le proprie pratiche.</p>\n<aside class=\"callout anthology\"><span class=\"callout-label\">Rimando Antologico</span><p>Dei delitti e delle pene: tortura, pena di morte e certezza della pena. Nella lettura occorre osservare insieme contenuto e strategia argomentativa.</p></aside>\n<h2>10. Pietro Verri: dal principio al caso storico</h2>\n<p>Pietro Verri fu scrittore, economista e funzionario. La sua biografia mostra il nodo caratteristico dell’Illuminismo italiano: l’intellettuale critica le istituzioni e contemporaneamente lavora al loro interno. Partecipò al Supremo consiglio di economia e alle riforme del sistema fiscale lombardo. Conobbe quindi dall’interno possibilità, resistenze e lentezze dell’amministrazione.</p>\n<p>Nelle <em>Meditazioni sull’economia politica</em> collegò crescita economica, popolazione, commercio e forza dello Stato. Non considerava l’economia un meccanismo separato dalla società. Il suo fine rimaneva la pubblica felicità, anche se entro i limiti di un riformismo governativo e paternalistico.</p>\n<p>Le <em>Osservazioni sulla tortura</em>, composte nel 1776-1777 e pubblicate postume nel 1804, prendono le mosse dal processo milanese agli untori del 1630. Verri ricostruisce testimonianze, procedure e pregiudizi che condussero alla condanna di innocenti accusati di diffondere la peste. Il caso storico dimostra come la tortura produca la colpa che pretende di scoprire.</p>\n<p>Fra Beccaria e Verri esiste una differenza didatticamente utile. Beccaria affronta il principio generale del diritto di punire; Verri mostra gli effetti concreti di una procedura ingiusta nella storia. Il primo costruisce un sistema argomentativo breve; il secondo unisce analisi documentaria e indignazione morale. Entrambi trasformano la prosa in strumento di riforma.</p>\n<aside class=\"callout note\"><span class=\"callout-label\">Precisazione Cronologica</span><p>Le Osservazioni sulla tortura non furono pubblicate nel 1777: furono composte nel 1776-1777 e stampate soltanto nel 1804.</p></aside>", "tools": {"summary": "Beccaria rifonda il diritto di punire sulla necessità, proporzione, certezza e prevenzione; Verri mostra storicamente come tortura, pregiudizio e procedura possano produrre la colpa. La prosa diventa insieme ragionamento generale e ricostruzione documentaria.", "essentials": ["La pena non deve vendicare ma prevenire.", "La certezza di una pena moderata è più efficace della crudeltà incerta.", "La tortura confonde forza fisica e verità.", "Beccaria discute il principio; Verri mostra un caso storico.", "Entrambi scrivono per costringere il potere a giustificarsi."], "vocab": [["Certezza della pena", "Sicurezza dell’applicazione della pena prevista dalla legge."], ["Proporzionalità", "Rapporto razionale tra gravità del delitto e intensità della pena."], ["Prevenzione", "Funzione della pena orientata a impedire delitti futuri."], ["Errore giudiziario", "Condanna prodotta da prove, procedure o pregiudizi inaffidabili."]], "anthology": [["Cesare Beccaria", "Dei delitti e delle pene", "Tortura, pena di morte e certezza", "Permette di ricostruire tesi, argomenti e immagini."], ["Pietro Verri", "Osservazioni sulla tortura", "Il processo agli untori", "Trasforma il principio in analisi di un errore storico."]], "questions": ["Perché la tortura è irrazionale secondo Beccaria?", "Quale differenza c’è tra vendetta e prevenzione?", "Che cosa aggiunge il caso storico di Verri alla teoria generale?"], "map": ["Beccaria e Verri", ["patto sociale", "pena necessaria", "certezza e proporzione", "critica della tortura", "principio + caso storico"]], "gbprof": "La giustizia sotto esame: dalla teoria di Beccaria agli untori di Verri", "mapFile": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjAwIiBoZWlnaHQ9IjcyMCIgdmlld0JveD0iMCAwIDEyMDAgNzIwIiByb2xlPSJpbWciIGFyaWEtbGFiZWxsZWRieT0idGl0bGUgZGVzYyI+Cjx0aXRsZSBpZD0idGl0bGUiPk1hcHBhIGNvbmNldHR1YWxlOiBCZWNjYXJpYSBlIFZlcnJpPC90aXRsZT48ZGVzYyBpZD0iZGVzYyI+QmVjY2FyaWEgZSBWZXJyaSBjb2xsZWdhdG8gYSBwYXR0byBzb2NpYWxlLCBwZW5hIG5lY2Vzc2FyaWEsIGNlcnRlenphIGUgcHJvcG9yemlvbmUsIGNyaXRpY2EgZGVsbGEgdG9ydHVyYSwgcHJpbmNpcGlvICsgY2FzbyBzdG9yaWNvPC9kZXNjPgo8ZGVmcz48bWFya2VyIGlkPSJhcnJvdyIgbWFya2VyV2lkdGg9IjEwIiBtYXJrZXJIZWlnaHQ9IjEwIiByZWZYPSI4IiByZWZZPSIzIiBvcmllbnQ9ImF1dG8iIG1hcmtlclVuaXRzPSJzdHJva2VXaWR0aCI+PHBhdGggZD0 yaW5jaXBpbyArIGNhc288L3RleHQ+Cjx0ZXh0IHg9IjIwMC41NTYyNjMxNTYwMzU0NyIgeT0iMjk4LjI5MDgzNjM3ODEzNzkiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIyMSIgZm9udC13ZWlnaHQ9IjYwMCIgZmlsbD0iIzI0MzczNSI+c3RvcmljbzwvdGV4dD4KPHRleHQgeD0iMTE0MCIgeT0iNjgwIiB0ZXh0LWFuY2hvcj0iZW5kIiBmb250LWZhbWlseT0iQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTgiIGZpbGw9IiM1ZTZjNjkiPkNvcnB1cyBnYnByb2YgwrcgYSBjdXJhIGRpIGdicHJvZiBlIExpYmVyYTwvdGV4dD48L3N2Zz4="}}, {"id": "italiano-unita-4-napoli-economia-civile-e-legislazione", "title": "Unità 4 · Napoli: economia civile e legislazione", "kind": "main", "body": "<h2>11. Il contesto napoletano</h2>\n<p>L’Illuminismo napoletano si sviluppò in una monarchia che cercava di rafforzare lo Stato, ma doveva confrontarsi con feudalità, grandi proprietà, squilibri territoriali e poteri ecclesiastici. Durante la stagione di Bernardo Tanucci il governo promosse una politica giurisdizionalista e sostenne alcune iniziative culturali e amministrative.</p>\n<p>Rispetto a Milano, Napoli fu meno centrata sul periodico breve e più sull’università, sull’insegnamento e sul grande trattato. I problemi dominanti furono commercio, agricoltura, fiducia pubblica, educazione, legislazione e riforma antifeudale. Anche in questo caso il sapere aspirava a diventare azione; ma la distanza fra progetto e applicazione rimase spesso ampia.</p>\n<h2>12. Antonio Genovesi e l’economia civile</h2>\n<p>Nel 1754 Antonio Genovesi ottenne a Napoli la cattedra di commercio e meccanica, generalmente considerata la prima cattedra europea di economia politica di cui si abbia documentazione certa. Il lascito di Bartolomeo Intieri prevedeva che le lezioni fossero tenute in italiano. La scelta aveva un significato civile: il sapere economico doveva uscire dal latino accademico e formare amministratori, commercianti e cittadini.</p>\n<p>Le <em>Lezioni di commercio o sia di economia civile</em>, pubblicate fra il 1765 e il 1767, collegano economia e società. Gli esseri umani hanno bisogno gli uni degli altri; il commercio nasce dentro un sistema di reciprocità e mutuo soccorso. L’interesse individuale non basta a produrre una società prospera se mancano virtù civili, istruzione e istituzioni affidabili.</p>\n<p>Genovesi attribuisce un ruolo centrale alla <strong>fede pubblica</strong>, cioè alla fiducia generalizzata che permette ai cittadini di stipulare accordi, scambiare e cooperare. Dove nessuno crede alla parola altrui, aumentano costi, sospetti e violenza; l’economia si indebolisce insieme alla vita civile.</p>\n<p>L’economia civile non è quindi un liberismo ingenuo. Il mercato rimane parte della società e deve essere valutato secondo il bene comune. La tradizione napoletana dialoga con la riflessione scozzese sulla simpatia e sulla società commerciale, ma conserva una propria fisionomia, legata all’umanesimo civile e ai problemi del Mezzogiorno.</p>\n<aside class=\"callout compare\"><span class=\"callout-label\">Confronto</span><p>Smith studia i meccanismi morali ed economici della società commerciale; Genovesi insiste sulla reciprocità, sulla fiducia e sulla funzione educativa delle istituzioni. Nessuno dei due riduce la società alla ricerca isolata del profitto.</p></aside>\n<h2>13. Gaetano Filangieri e la scienza della legislazione</h2>\n<p>Con <em>La scienza della legislazione</em>, iniziata nel 1780, Gaetano Filangieri progettò una riflessione sistematica sullo Stato moderno. L’opera avrebbe dovuto articolarsi in sette libri dedicati alle regole generali, alle leggi politiche ed economiche, alle leggi criminali, all’educazione, alla religione, alla proprietà e al diritto di famiglia. Filangieri completò i primi quattro; il quinto uscì postumo nel 1791.</p>\n<p>La legislazione è per Filangieri una scienza perché deve mettere in relazione norme, condizioni storiche e felicità dei cittadini. Una legge non può essere giudicata soltanto per la coerenza formale: bisogna considerarne gli effetti sull’economia, sui costumi, sull’istruzione e sulla libertà.</p>\n<p>L’educazione occupa un posto decisivo. Lo Stato deve formare cittadini capaci di partecipare alla vita civile; l’ignoranza rende inefficaci anche le leggi migliori. Filangieri collega quindi riforma giuridica e trasformazione culturale. La sua opera fu tradotta e discussa in Europa e nel mondo americano, diventando, insieme a quella di Beccaria, uno dei maggiori contributi italiani al dibattito internazionale.</p>\n<p>Il progetto incontrò però scarsa applicazione nel Regno di Napoli. Dopo l’allontanamento di Tanucci nel 1776, il riformismo borbonico perse forza. La distanza fra la complessità dell’opera e la capacità del governo mostra uno dei limiti strutturali dei Lumi italiani.</p>\n<aside class=\"callout anthology\"><span class=\"callout-label\">Rimando Antologico</span><p>Filangieri, La scienza della legislazione: introduzione generale o libro sull’educazione. Il testo permette di leggere la legge come progetto complessivo di società.</p></aside>\n<h2>14. Dal riformismo alla crisi del 1799</h2>\n<p>La Rivoluzione francese radicalizzò una parte dell’ambiente napoletano. Francesco Mario Pagano ed Eleonora de Fonseca Pimentel appartengono soprattutto a questa fase tarda. Nel 1799 la breve Repubblica napoletana trasformò alcuni intellettuali riformatori in protagonisti di un conflitto politico rivoluzionario.</p>\n<p>Il passaggio non fu automatico. Molti illuministi rimasero legati al progetto di una monarchia riformatrice; altri conclusero che il governo non fosse più capace di cambiare. Il 1799 deve quindi comparire come crisi e possibile esito, non come compimento necessario dell’Illuminismo napoletano.</p>\n<p>Eleonora de Fonseca Pimentel, direttrice del <em>Monitore Napoletano</em>, rappresenta l’ingresso eccezionale di una donna nella sfera politica e giornalistica rivoluzionaria. La sua figura appartiene alla cerniera fra Lumi e rivoluzione e rende visibili, insieme, apertura della discussione pubblica e persistenza delle esclusioni.</p>\n<aside class=\"callout bridge\"><span class=\"callout-label\">Confine Editoriale</span><p>La Repubblica napoletana sarà soltanto richiamata. Il centro del capitolo resta il riformismo settecentesco, non la storia politica del 1799.</p></aside>", "tools": {"summary": "A Napoli università e trattato diventano strumenti di riforma. Genovesi pensa l’economia come rete di reciprocità e fede pubblica; Filangieri collega legislazione, educazione e felicità dei cittadini. Il 1799 segna la crisi, non il compimento necessario, del riformismo.", "essentials": ["L’Illuminismo napoletano privilegia insegnamento e grande trattato.", "Genovesi lega sviluppo economico a fiducia e virtù civili.", "Filangieri concepisce la legislazione come scienza complessiva della società.", "L’educazione rende efficaci le leggi.", "La rivoluzione del 1799 è una possibile risposta alla crisi del riformismo."], "vocab": [["Economia civile", "Economia inserita nelle relazioni di reciprocità e bene comune."], ["Fede pubblica", "Fiducia generalizzata che rende possibili accordi e cooperazione."], ["Scienza della legislazione", "Studio sistematico degli effetti delle leggi sulla società."], ["Antifeudalesimo", "Critica dei privilegi e dei vincoli feudali."]], "anthology": [["Antonio Genovesi", "Lezioni di commercio", "Fede pubblica e mutuo soccorso", "Mostra che il mercato dipende da legami civili."], ["Gaetano Filangieri", "La scienza della legislazione", "Educazione e riforma dello Stato", "Collega legge e trasformazione culturale."], ["Eleonora de Fonseca Pimentel", "Monitore Napoletano", "Un articolo del 1799", "Fa vedere il passaggio dalla sfera riformatrice a quella rivoluzionaria."]], "questions": ["Perché Genovesi non è un teorico del profitto isolato?", "Che rapporto stabilisce Filangieri tra legge ed educazione?", "Perché il 1799 non è il destino necessario dei Lumi napoletani?"], "map": ["Napoli illuminista", ["università", "economi fficoltà del processo. Il governo intervenne su ordini religiosi, seminari, assistenza e pratiche devozionali. Le opposizioni popolari e clericali ricordano che una riforma amministrativamente razionale può entrare in conflitto con identità, consuetudini e forme comunitarie profondamente radicate.</p>\n<p>Anche l’istruzione fu modificata in modo meno organico di quanto suggerisca l’immagine celebrativa del “granduca filosofo”. Scuole e università non vennero trasformate uniformemente; molte istituzioni restarono legate agli ordini religiosi.</p>\n<aside class=\"callout warning\"><span class=\"callout-label\">Errore Da Evitare</span><p>La Toscana leopoldina non fu la realizzazione completa dei Lumi. Fu un laboratorio avanzato, ma autoritativo, fragile, parziale e contestato.</p></aside>\n<h2>16. La Leopoldina del 1786</h2>\n<p>Il 30 novembre 1786 Pietro Leopoldo promulgò la <em>Riforma della legislazione criminale</em>, poi chiamata Leopoldina. Il provvedimento abolì la tortura, la pena di morte e la confisca dei beni, limitò l’arbitrio del giudice e cercò una maggiore proporzione fra delitti e pene. La pena capitale non veniva eseguita in Toscana già dal 1775, ma la riforma trasformò tale prassi in norma giuridica.</p>\n<p>La legge dialogava con l’Illuminismo giuridico europeo e con Beccaria, ma non fu una semplice applicazione del suo libro. Dipese anche dalla storia amministrativa toscana, dall’iniziativa del sovrano e dal lavoro dei funzionari. Idee, decisioni politiche ed effetti istituzionali devono essere distinti.</p>\n<p>L’importanza della Leopoldina è concreta e simbolica. Per la prima volta uno Stato aboliva formalmente la pena capitale dal proprio ordinamento. Ciò non significa che l’intero sistema penale fosse ormai moderno o privo di durezza; dimostra però che una critica elaborata nei libri poteva entrare nella legge positiva.</p>\n<p>Altri progetti più ampi, come alcune ipotesi costituzionali e giudiziarie, non furono realizzati prima del trasferimento di Pietro Leopoldo a Vienna nel 1790. La Toscana insegna quindi a distinguere il provvedimento effettivo dalla promessa di riforma.</p>\n<aside class=\"callout anthology\"><span class=\"callout-label\">Rimando Antologico</span><p>Riforma della legislazione criminale del 30 novembre 1786: proemio e articoli sull’abolizione di tortura e pena di morte.</p></aside>", "tools": {"summary": "In Toscana l’Illuminismo entra direttamente nel governo. Pietro Leopoldo promuove riforme amministrative, ecclesiastiche e penali dall’alto. La Leopoldina del 1786 abolisce tortura e pena di morte, ma il laboratorio resta autoritativo, parziale e contestato.", "essentials": ["Il governo leopoldino unisce autorità assoluta e riforma.", "Le riforme possono scontrarsi con identità e consuetudini.", "La Leopoldina traduce alcuni principi illuministici in diritto positivo.", "Il provvedimento effettivo va distinto dai progetti incompiuti."], "vocab": [["Leopoldina", "Riforma criminale promulgata in Toscana il 30 novembre 1786."], ["Diritto positivo", "Insieme delle norme effettivamente vigenti."], ["Riforma dall’alto", "Cambiamento deciso dal sovrano senza partecipazione politica dei cittadini."], ["Confisca", "Acquisizione dei beni del condannato da parte dello Stato."]], "anthology": [["Pietro Leopoldo", "Riforma della legislazione criminale", "Proemio e articoli su tortura e pena di morte", "Permette di distinguere principio, decisione politica e norma."], ["Cesare Beccaria", "Dei delitti e delle pene", "Il capitolo sulla pena di morte", "Consente il confronto tra teoria e legislazione."]], "questions": ["Perché “dispotismo illuminato” è una formula ambivalente?", "Che cosa rende storicamente decisiva la Leopoldina?", "Perché non va presentata come piena realizzazione dei Lumi?"], "map": ["Toscana leopoldina", ["governo riformatore", "amministrazione", "rapporti con la Chiesa", "Leopoldina 1786", "limiti autoritativi"]], "gbprof": "Quando un’idea diventa legge: Beccaria e la Toscana di sistema teorico abbastanza generale da circolare oltre il contesto immediato. Anche il silenzio editoriale può essere strategico, come mostra la pubblicazione postuma delle <em>Osservazioni sulla tortura</em>.</p>\n<aside class=\"callout note\"><span class=\"callout-label\">Idea Centrale</span><p>La nuova prosa non elimina la letteratura: trasferisce la letterarietà dall’ornamento alla costruzione efficace del lettore, dell’argomento e della scena pubblica.</p></aside>\n<h2>18. Le forme della comunicazione</h2>\n<div class=\"table-wrap\"><table><thead><tr><th><strong>Forma</strong></th><th><strong>Tecniche</strong></th><th><strong>Funzione</strong></th><th><strong>Esempio</strong></th></tr></thead><tbody><tr><td>Articolo periodico</td><td>Brevità, serialità, tono conversativo</td><td>Diffondere idee e formare il lettore</td><td>Beccaria, <em>De’ fogli periodici</em></td></tr><tr><td>Parodia polemica</td><td>Imitazione di una forma ufficiale, ironia</td><td>Colpire il purismo e l’autorità linguistica</td><td>Alessandro Verri, <em>Rinunzia avanti notaio</em></td></tr><tr><td>Saggio argomentativo</td><td>Tesi, deduzione, immagini, confutazione</td><td>Riformare diritto e costumi</td><td>Beccaria, <em>Dei delitti e delle pene</em></td></tr><tr><td>Ricostruzione storica</td><td>Documenti, narrazione e giudizio</td><td>Mostrare gli effetti di una procedura ingiusta</td><td>Pietro Verri, <em>Osservazioni sulla tortura</em></td></tr><tr><td>Trattato economico</td><td>Definizioni, esempi, insegnamento sistematico</td><td>Formare amministratori e cittadini</td><td>Genovesi, <em>Lezioni di commercio</em></td></tr><tr><td>Scienza legislativa</td><td>Architettura sistematica e comparazione</td><td>Progettare la riforma dello Stato</td><td>Filangieri, <em>Scienza della legislazione</em></td></tr><tr><td>Scrittura normativa</td><td>Proemio, articoli e disposizioni</td><td>Tradurre principi in diritto positivo</td><td>Leopoldina del 1786</td></tr></tbody></table></div>\n<p>Le forme non sono semplici contenitori. La brevità del periodico costruisce un lettore diverso da quello del trattato; la parodia rende la critica linguistica più memorabile; il caso storico di Verri dimostra ciò che l’argomento generale di Beccaria afferma. La scelta formale determina il modo in cui un’idea può agire.</p>\n<h2>19. Una lingua per la società contemporanea</h2>\n<p>La lingua della nuova prosa deve denominare fenomeni che la tradizione letteraria aveva affrontato raramente: commercio, finanza, legislazione, amministrazione, tecniche, comportamenti sociali. Da qui nascono neologismi, forestierismi e adattamenti. Il criterio non è la novità per se stessa, ma la precisione utile.</p>\n<p>La battaglia contro il purismo non cancella il problema della qualità. Gli illuministi milanesi cercano ordine, energia e armonia. Il lettore deve comprendere senza essere trattato come destinatario passivo. Chiarezza significa rendere visibile la successione delle idee; brevità significa eliminare ciò che ostacola l’effetto; ironia significa creare distanza dal pregiudizio.</p>\n<p>Questa trasformazione prepara la discussione ottocentesca sulla lingua nazionale, ma non la risolve. La prosa civile rimane letta da una minoranza alfabetizzata; l’italiano non diventa ancora lingua quotidiana della popolazione. Anche qui l’universalismo del progetto incontra un limite sociale.</p>\n<aside class=\"callout bridge\"><span class=\"callout-label\">Ponte Verso Goldoni E Parini</span><p>Goldoni porterà l’osservazione sociale sulla scena e costruirà un nuovo rapporto con il pubblico teatrale. Parini trasformerà la critica illuministica della nobiltà in poesia satirica e civile. I loro percorsi saranno sviluppati nei capitoli autonomi successivi.</p></aside>\n<h2>20. Presenze femminili e limiti dell’inclusione</h2>\n<p>L’ampliamento dei pubblici non cancellò l’esclusione delle donne dall’istruzione superiore, dalle carriere e dalla cittadinanza. Le eccezioni mostrano aperture reali, ma anche la loro rarità.</p>\n<p>Maria Gaetana Agnesi pubblicò nel 1748 le <em>Istituzioni analitiche</em>, un’importante opera matematica. La sua formazione fu resa possibile da un ambiente familiare eccezionalmente colto. Agnesi testimonia la presenza femminile nella cultura scientifica milanese, ma non rappresenta una normale possibilità offerta alle donne del tempo.</p>\n<p>Eleonora de Fonseca Pimentel appartiene soprattutto alla fase rivoluzionaria del 1799. La direzione del <em>Monitore Napoletano</em> la rese protagonista della sfera pubblica repubblicana. Collocarla come cerniera finale permette di mostrare come una donna potesse utilizzare il linguaggio politico dei Lumi e, contemporaneamente, quanto restasse eccezionale il suo accesso alla cittadinanza.</p>\n<p>Il riformismo rimase inoltre elitario per ceto e alfabetizzazione. Nobili, ecclesiastici, funzionari e professori parlavano spesso in nome della popolazione senza coinvolgerla direttamente. Le riforme potevano migliorare la vita collettiva, ma non trasformavano i sudditi in cittadini politicamente sovrani.</p>\n<aside class=\"callout question\"><span class=\"callout-label\">Domanda Di Ragionamento</span><p>Un progetto può essere universalistico nei principi e selettivo nei soggetti che hanno il diritto concreto di parlare e decidere?</p></aside>", "tools": {"summary": "La nuova prosa civile italiana assume forme diverse — articolo, parodia, saggio, trattato, ricostruzione storica, norma — ma condivide un obiettivo: costruire argomenti efficaci per intervenire sulla società. La modernizzazione linguistica resta limitata da alfabetizzazione ed esclusioni.", "essentials": ["La letterarietà si sposta dall’ornamento alla costruzione dell’argomento e del lettore.", "La forma scelta determina il modo in cui un’idea agisce.", "Chiarezza, brevità e ironia sono tecniche, non assenza di stile.", "La lingua deve nominare economia, diritto, amministrazione e tecnica.", "L’ampliamento dei pubblici non produce ancora citta inismo italiano trasforma il sapere in progetto di riforma e la prosa in azione civile, ma affida il cambiamento a minoranze colte e a governi che ne determinano possibilità e confini.</p></aside>", "tools": {"summary": "L’Illuminismo italiano produce contributi originali e risultati concreti, ma affida il cambiamento a minoranze colte e governi autoritari. La sua grandezza e il suo limite coincidono: trasformare il sapere in azione senza trasformare pienamente i sudditi in cittadini.", "essentials": ["Policentrismo e concretezza sono caratteri originali.", "Intellettuale e funzionario spesso coincidono.", "Le riforme dipendono dalla volontà dei sovrani.", "Partecipazione popolare e femminile restano limitate."], "vocab": [["Paternalismo", "Governo che decide il bene dei sudditi senza riconoscerne piena autonomia politica."], ["Cittadino", "Soggetto titolare di diritti e partecipazione politica, non semplice suddito."], ["Crisi del riformismo", "Momento in cui la trasformazione dall’alto appare insufficiente o bloccata."]], "anthology": [["Eleonora de Fonseca Pimentel", "Monitore Napoletano", "Un articolo sulla Repubblica", "Mostra la cerniera fra riformismo e rivoluzione."]], "questions": ["Quali risultati concreti produce l’Illuminismo italiano?", "Perché il suo progetto resta paternalistico?", "Quale tensione porta alcuni intellettuali verso la rivoluzione?"], "map": ["Bilancio italiano", ["originalità", "prosa civile", "riforme concrete", "dipendenza dai sovrani", "partecipazione limitata"]], "gbprof": "Il prezzo della concretezza: risultati e confini del riformismo italiano", "mapFile": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjAwIiBoZWlnaHQ9IjcyMCIgdmlld0JveD0iMCAwIDEyMDAgNzIwIiByb2xlPSJpbWciIGFyaWEtbGFiZWxsZWRieT0idGl0bGUgZGVzYyI+Cjx0aXRsZSBpZD0idGl0bGUiPk1hcHBhIGNvbmNldHR1YWxlOiBCaWxhbmNpbyBpdGFsaWFubzwvdGl0bGU+PGRlc2MgaWQ9ImRlc2MiPkJpbGFuY2lvIGl0YWxpYW5vIGNvbGxlZ2F0byBhIG9yaWdpbmFsaXTDoCwgcHJvc2EgY2l2aWxlLC ormismo produce risultati importanti, ma resta elitario, parziale e dipendente dai sovrani.</td></tr></tbody></table></div>\n<h2>Vocabolario essenziale</h2>\n<div class=\"table-wrap\"><table><thead><tr><th><strong>Termine</strong></th><th><strong>Definizione</strong></th></tr></thead><tbody><tr><td>Policentrismo</td><td>Presenza di più centri autonomi collegati, senza un’unica direzione nazionale.</td></tr><tr><td>Riformismo</td><td>Progetto di trasformazione graduale delle istituzioni senza rovesciamento rivoluzionario.</td></tr><tr><td>Pubblica felicità</td><td>Benessere collettivo assunto come fine del governo e criterio delle riforme.</td></tr><tr><td>Economia civile</td><td>Concezione dell’economia come rete di reciprocità, fiducia e bene comune.</td></tr><tr><td>Fede pubblica</td><td>Fiducia generalizzata che rende possibili cooperazione, accordi e scambi.</td></tr><tr><td>Utilità</td><td>Capacità del sapere o di una norma di produrre effetti positivi sulla società.</td></tr><tr><td>Giurisdizionalismo</td><td>Politica con cui lo Stato limita le competenze temporali della Chiesa.</td></tr><tr><td>Cattolicesimo illuminato</td><td>Tentativo di conciliare fede cattolica, ragione e riforma delle istituzioni.</td></tr><tr><td>Prosa civile</td><td>Scrittura argomentativa orientata alla discussione pubblica e alla riforma.</td></tr><tr><td>Anticruscantesimo</td><td>Critica dell’autorità linguistica della Crusca e del purismo tradizionale.</td></tr><tr><td>Certezza della pena</td><td>Principio per cui l’efficacia preventiva dipende più dalla sicurezza che dalla crudeltà della pena.</td></tr><tr><td>Proporzionalità</td><td>Rapporto razionale fra gravità del delitto e intensità della pena.</td></tr><tr><td>Dispotismo illuminato</td><td>Categoria storiografica per alcune riforme promosse da sovrani assoluti.</td></tr><tr><td>Leopoldina</td><td>Riforma criminale toscana promulgata da Pietro Leopoldo il 30 novembre 1786.</td></tr></tbody></table></div>\n<h2>Cronologia essenziale</h2>\n<div class=\"table-wrap\"><table><thead><tr><th><strong>Data</strong></th><th><strong>Evento o opera</strong></th></tr></thead><tbody><tr><td>1748</td><td>Maria Gaetana Agnesi, <em>Istituzioni analitiche</em></td></tr><tr><td>1751</td><td>Ferdinando Galiani, <em>Della moneta</em></td></tr><tr><td>1754</td><td>Genovesi ottiene la cattedra di commercio e meccanica</td></tr><tr><td>1763</td><td>Pietro Verri, <em>Meditazioni sulla felicità</em></td></tr><tr><td>1764</td><td>Beccaria, <em>Dei delitti e delle pene</em>; nasce <em>Il Caffè</em></td></tr><tr><td>1764-1766</td><td>Pubblicazione dei settantaquattro numeri del <em>Caffè</em></td></tr><tr><td>1765-1767</td><td>Genovesi, <em>Lezioni di commercio o sia di economia civile</em></td></tr><tr><td>1765-1790</td><td>Governo toscano di Pietro Leopoldo</td></tr><tr><td>1776-1777</td><td>Composizione delle <em>Osservazioni sulla tortura</em></td></tr><tr><td>1780</td><td>Inizio della pubblicazione della <em>Scienza della legislazione</em></td></tr><tr><td>1786</td><td>Promulgazione della Leopoldina</td></tr><tr><td>1791</td><td>Pubblicazione postuma del quinto libro di Filangieri</td></tr><tr><td>1799</td><td>Repubblica napoletana e <em>Monitore Napoletano</em></td></tr><tr><td>1804</td><td>Pubblicazione postuma delle <em>Osservazioni sulla tortura</em></td></tr></tbody></table></div>\n<h2>Guida allo studio</h2>\n<h3>Comprendere</h3>\n<p>Perché è più corretto parlare di Illuminismo italiano policentrico?</p>\n<p>Quale rapporto esiste fra intellettuali e governi riformatori?</p>\n<p>Che cosa indica il termine giurisdizionalismo?</p>\n<p>Perché <em>Il Caffè</em> è anche un’opera letteraria ed editoriale?</p>\n<p>Quale concezione della lingua emerge dalla polemica contro la Crusca?</p>\n<p>Quali principi guidano la teoria della pena di Beccaria?</p>\n<p>In che cosa differiscono <em>Dei delitti e delle pene</em> e <em>Osservazioni sulla tortura</em>?</p>\n<p>Che cosa significano economia civile e fede pubblica in Genovesi?</p>\n<p>Quale progetto sostiene <em>La scienza della legislazione</em>?</p>\n<p>Quali riforme introduce la Leopoldina?</p>\n<p>Perché il riformismo italiano rimane elitario?</p>\n<h3>Collegare e interpretare</h3>\n<p>Confronta Milano, Napoli e Toscana per temi, forme della scrittura e rapporti col potere.</p>\n<p>Metti in relazione anti-purismo linguistico e volontà di riformare la società.</p>\n<p>Confronta Beccaria e Verri nella critica della tortura.</p>\n<p>Spiega perché Genovesi non può essere ridotto a teorico del libero mercato.</p>\n<p>Discuti possibilità e limiti del cosiddetto dispotismo illuminato.</p>\n<p>Rifletti sul rapporto fra universalismo dei principi ed esclusione dalla cittadinanza.</p>\n<h3>Preparare l’esposizione orale</h3>\n<aside class=\"callout activity\"><span class=\"callout-label\">Traccia</span><p>Presenta la pluralità dei centri; sviluppa Milano e Il Caffè; illustra Beccaria e Verri; spiega l’economia civile napoletana e Filangieri; descrivi la Toscana leopoldina; concludi definendo la nuova prosa civile e i limiti del riformismo.</p></aside>\n<h3>Laboratorio delle fonti</h3>\n<div class=\"table-wrap\"><table><thead><tr><th><strong>Attività</strong></th><th><strong>Consegna</strong></th></tr></thead><tbody><tr><td>Lingua e stile</td><td>Confronta un periodo della <em>Rinunzia</em> con un articolo del <em>Caffè</em>: individua ironia e lessico moderno.</td></tr><tr><td>Argomentazione</td><td>Ricostruisci tesi, argomenti ed esempio in un passo di Beccaria.</td></tr><tr><td>Caso storico</td><td>Confronta la critica teorica della tortura con il processo agli untori studiato da Verri.</td></tr><tr><td>Economia civile</td><td>Spiega il rapporto fra fiducia e sviluppo economico in Genovesi.</td></tr><tr><td>Fonte normativa</td><td>Analizza il proemio e un articolo della Leopoldina distinguendo principio e norma.</td></tr><tr><td>Compito autentico</td><td>Scrivi un breve articolo nello stile del <em>Caffè</em> contro un pregiudizio contemporaneo.</td></tr></tbody></table></div>", "tools": null}, {"id": "italiano-rimandi-alla-parte-antologica", "title": "Rimandi alla parte antologica", "kind": "anthology", "body": "<div class=\"table-wrap\"><table><thead><tr><th><strong>Autore</strong></th><th><strong>Opera</strong></th><th><strong>Nucleo di lettura</strong></th></tr></thead><tbody><tr><td>Cesare Beccaria</td><td><em>De’ fogli periodici</em></td><td>Funzione del giornalismo e costruzione del lettore</td></tr><tr><td>Alessandro Verri</td><td><em>Rinunzia avanti notaio al Vocabolario della Crusca</em></td><td>Lingua, ironia e anti-purismo</td></tr><tr><td>Cesare Beccaria</td><td><em>Frammento sullo stile</em></td><td>Ordine delle idee ed efficacia del discorso</td></tr><tr><td>Luigi Lambertenghi</td><td><em>Gli studi utili</em></td><td>Utilità sociale della cultura</td></tr><tr><td>Cesare Beccaria</td><td><em>Dei delitti e delle pene</em></td><td>Tortura, pena di morte e certezza della pena</td></tr><tr><td>Pietro Verri</td><td><em>Meditazioni sulla felicità</em></td><td>Pubblica felicità e uguaglianza</td></tr><tr><td>Pietro Verri</td><td><em>Osservazioni sulla tortura</em></td><td>Caso storico ed errore giudiziario</td></tr><tr><td>Antonio Genovesi</td><td><em>Lezioni di commercio</em></td><td>Fede pubblica, reciprocità ed economia civile</td></tr><tr><td>Gaetano Filangieri</td><td><em>La scienza della legislazione</em></td><td>Educazione e riforma dello Stato</td></tr><tr><td>Pietro Leopoldo</td><td><em>Riforma della legislazione criminale</em></td><td>Traduzione legislativa dei Lumi</td></tr></tbody></table></div>", "tools": null}, {"id": "italiano-bibliografia-essenziale-per-il-docente", "title": "Bibliografia essenziale per il docente", "kind": "biblio", "body": "<p>Capra, Carlo, <em>I progressi della ragione. Vita di Pietro Verri</em>, Il Mulino.</p>\n<p>Francioni, Gianni (a cura di), <em>Il Caffè</em>, edizione critica nel portale <em>Illuminismo lombardo</em>.</p>\n<p>Venturi, Franco, <em>Settecento riformatore</em>, Einaudi, più volumi.</p>\n<p>Ferrone, Vincenzo; Roche, Daniel (a cura di), <em>L’Illuminismo. Dizionario storico</em>, Laterza.</p>\n<p>Robertson, John, <em>The Case for the Enlightenment: Scotland and Naples 1680-1760</em>, Cambridge University Press.</p>\n<p>Bruni, Luigino; Zamagni, Stefano, studi sull’economia civile italiana.</p>\n<p>Genovesi, Antonio, <em>Lezioni di commercio o sia di economia civile</em>, edizione critica a cura di M. L. Perna.</p>\n<p>Audegean, Philippe; Francioni, Gianni, studi ed edizioni critiche di Cesare Beccaria.</p>\n<p>Mascilli Migliorini, Luigi, <em>Il Granducato di Toscana. L’età delle riforme</em>.</p>\n<p>Edizione Nazionale delle opere di Pietro Verri e portale <em>Illuminismo lombardo</em>.</p>\n<p>Dizionario Biografico degli Italiani e voci Treccani su Verri, Beccaria, Genovesi, Filangieri e Pietro Leopoldo.</p>\n<p>Archivio di Stato di Firenze, documentazione sulla legge Leopoldina del 1786.</p>\n<p><em>Nota editoriale: la scelta definitiva delle edizioni e dei brani sarà effettuata durante la preparazione della seconda parte antologica. Il testo delle opere è in pubblico dominio; gli apparati delle moderne edizioni critiche restano protetti.</em></p>", "tools": null}]}]};</script><script>
const DATA=window.SITE_DATA;
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const state={chapter:null,lesson:null};
const completed=new Set(JSON.parse(localStorage.getItem('completedLessons')||'[]'));
let fontScale=Number(localStorage.getItem('fontScale')||1);
let theme=localStorage.getItem('theme')||'light';
document.documentElement.dataset.theme=theme==='dark'?'dark':'';
document.documentElement.style.fontSize=(16*fontScale)+'px';

function icon(name){const paths={menu:'<path d="M4 7h16M4 12h16M4 17h16"/>',search:'<circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/>',moon:'<path d="M20 15.5A8 8 0 1 1 8.5 4 6.5 6.5 0 0 0 20 15.5Z"/>',sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',print:'<path d="M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v7H6z"/>',close:'<path d="m6 6 12 12M18 6 6 18"/>',home:'<path d="m3 11 9-8 9 8v10h-6v-6H9v6H3z"/>'};return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths[name]||''}</svg>`}

function allLessons(){return DATA.chapters.flatMap(c=>c.lessons.map(l=>({...l,chapter:c})));}
function route(){const raw=location.hash.slice(1); if(!raw||raw==='/'){renderHome();return} const parts=raw.split('/').filter(Boolean); if(parts[0]==='chapter'){const ch=DATA.chapters.find(c=>c.id===parts[1]); if(!ch){renderHome();return} const lesson=ch.lessons.find(l=>l.id===parts[2])||ch.lessons[0]; renderLesson(ch,lesson);return} renderHome()}

function topbar(){return `<header class="topbar"><button class="icon-btn mobile-menu" aria-label="Apri indice">${icon('menu')}</button><a class="brand" href="#/"><span class="brand-mark">L</span><span class="brand-text">Corpus gbprof<small>Letteratura · Quarto anno</small></span></a><div class="top-actions"><button class="icon-btn" id="searchBtn" aria-label="Cerca">${icon('search')}</button><button class="icon-btn font-btn" id="fontDown" aria-label="Riduci testo">A−</button><button class="icon-btn font-btn" id="fontUp" aria-label="Aumenta testo">A+</button><button class="icon-btn" id="themeBtn" aria-label="Cambia tema">${theme==='dark'?icon('sun'):icon('moon')}</button><button class="icon-btn" id="printBtn" aria-label="Stampa">${icon('print')}</button></div></header>`}

function sidebar(ch,active){if(!ch)return ''; let n=0; const rows=ch.lessons.map(l=>{const isSpecial=['tools','anthology','biblio'].includes(l.kind); if(!isSpecial)n++; const label=isSpecial?'•':String(n).padStart(2,'0'); return `<button class="nav-btn ${l.id===active?'active':''} ${isSpecial?'special':''}" data-route="#/chapter/${ch.id}/${l.id}"><span class="num">${label}</span><span>${l.title}</span></button>`}).join(''); return `<aside class="sidebar"><button class="icon-btn mobile-close" aria-label="Chiudi indice">${icon('close')}</button><div class="nav-label">${ch.title}</div>${rows}<div class="future-nav"><div class="nav-label">Collegamenti futuri</div><div class="future-pill">Antologia completa <span>in progetto</span></div><div class="future-pill">Lezioni gbprof <span>in progetto</span></div></div></aside>`}

function shell(content,ch=null,active=null){document.querySelector('#app').innerHTML=`${topbar()}<div class="layout">${sidebar(ch,active)}<main class="main">${content}</main></div><section class="search-panel hidden" aria-label="Ricerca"><div class="search-box"><input id="searchInput" type="search" placeholder="Cerca concetti, autori, opere…" autofocus><div class="results"></div></div></section><div class="map-modal hidden"><button class="icon-btn" aria-label="Chiudi mappa">${icon('close')}</button><img alt="Mappa concettuale ingrandita"></div>`; bindGlobal();}

function renderHome(){state.chapter=null;state.lesson=null; const cards=DATA.chapters.map((c,i)=>`<article class="chapter-card"><span class="eyebrow">Modulo ${i+1}</span><h2>${c.title}</h2><p>${c.subtitle}</p><div class="chapter-meta"><span class="chip">${c.lessons.filter(l=>l.kind==='main').length} sezioni</span><span class="chip">mappe SVG</span><span class="chip">studio offline</span></div><button class="primary-btn" data-route="#/chapter/${c.id}/${c.lessons[0].id}">Entra nel capitolo</button></article>`).join(''); const content=`<section class="page"><div class="home"><span class="eyebrow">Parte I · Percorso classico</span><h1>Illuminismo.<br>Un sito-manuale che prepara i collegamenti.</h1><p class="subtitle">La prova integra la spiegazione tradizionale con sintesi, saperi irrinunciabili, vocabolario, mappe concettuali, testi antologici selezionati e spazi predisposti per le future lezioni di gbprof.</p><div class="chapter-grid">${cards}</div><section><span class="eyebrow">Struttura ricorrente</span><div class="system-strip"><div class="system-item"><b>Lezione</b><span>Il testo completo del capitolo.</span></div><div class="system-item"><b>Ripasso</b><span>Sintesi e nuclei irrinunciabili.</span></div><div class="system-item"><b>Vocabolario</b><span>Termine, definizione e contesto.</span></div><div class="system-item"><b>Mappa</b><span>SVG nitido, ingrandibile e stampabile.</span></div><div class="system-item"><b>Connessioni</b><span>Antologia e lezione di gbprof.</span></div></div></section><section class="pathway"><span class="eyebrow">Architettura del progetto</span><h2>Tre spazi distinti, un solo percorso</h2><div class="path-line"><span class="path-node active">Manuale di letteratura</span><span class="arrow">→</span><span class="path-node">Antologia</span><span class="arrow">→</span><span class="path-node">Lezioni di gbprof</span></div><p>In questa prova è attivo il manuale. I rimandi agli altri due spazi sono già progettati, ma non fingono di essere completi.</p></section></div></section>`; shell(content); document.title='Illuminismo · Corpus gbprof';}

function renderToolkit(t,lesson){if(!t)return ''; const ess=t.essentials.map(x=>`<li>${x}</li>`).join(''); const vocab=t.vocab.map(([a,b])=>`<div class="vocab-item"><dt>${a}</dt><dd>${b}</dd></div>`).join(''); const anth=t.anthology.map(([a,o,p,w])=>`<article class="anthology-card"><b>${a}</b><em>${o}</em><span>${p}</span><small>${w}</small></article>`).join(''); const qs=t.questions.map((q,i)=>`<details><summary>${i+1}. ${q}</summary><p>Apri il testo della lezione e costruisci una risposta in tre passaggi: tesi, prova dal testo, conclusione.</p></details>`).join(''); return `<section class="toolkit"><div class="toolkit-header"><div><span class="eyebrow">Dopo la lezione</span><h2>Consolida e collega</h2></div><p>Il nucleo didattico della sezione.</p></div><div class="tool-grid"><article class="tool-card summary-card"><h3>Riassunto ragionato</h3><p>${t.summary}</p></article><article class="tool-card"><h3>Saperi irrinunciabili</h3><ol class="essential-list">${ess}</ol></article><article class="tool-card"><h3>Vocabolario essenziale</h3><dl class="vocab-list">${vocab}</dl></article><article class="tool-card"><h3>Mappa concettuale</h3><div class="map-frame"><img src="${t.mapFile}" alt="Mappa concettuale: ${t.map[0]}" loading="lazy"></div><div class="map-actions"><button class="small-btn map-open" data-map="${t.mapFile}">Ingrandisci</button><a class="small-btn" href="${t.mapFile}" download>Scarica SVG</a></div></article><article class="tool-card full"><h3>Testi per capire</h3><div class="anthology-grid">${anth}</div></article><article class="tool-card future-box"><span class="status">Collegamento predisposto</span><h3>La lezione di gbprof</h3><b>${t.gbprof}</b><p>Questo spazio ospiterà la tua spiegazione, un video, una dispensa o un’esperienza immersiva. Il collegamento porterà direttamente alla lezione corrispondente.</p><button class="small-btn" disabled>Non ancora pubblicata</button></article><article class="tool-card quiz"><h3>Verifica rapida</h3>${qs}</article></div></section>`}

function renderLesson(ch,l){state.chapter=ch;state.lesson=l; const mainLessons=ch.lessons.filter(x=>x.kind==='main'); const idx=mainLessons.findIndex(x=>x.id===l.id); const progress=idx>=0?Math.round(((idx+1)/mainLessons.length)*100):100; const special=l.kind!=='main'; const content=`<section class="page ${special?'special-page':''}"><header class="lesson-hero"><div class="lesson-kicker"><a href="#/">Manuale</a><span>›</span><span>${ch.title}</span></div><h1>${l.title}</h1>${!special?`<div class="progress-shell"><div class="progress-bar" style="width:${progress}%"></div></div><div class="progress-text">Sezione ${idx+1} di ${mainLessons.length} · ${progress}% del capitolo</div>`:''}</header><article class="article">${l.body}<div class="source-note">Testo base: capitolo fornito da gbprof. La struttura web conserva i contenuti e aggiunge il livello didattico e i collegamenti progettuali.</div></article>${renderToolkit(l.tools,l)}${!special?`<footer class="lesson-footer"><button class="prev-btn">← Sezione precedente</button><button class="complete-btn ${completed.has(l.id)?'done':''}">${completed.has(l.id)?'✓ Studiata':'Segna come studiata'}</button><button class="next-btn">Sezione successiva →</button></footer>`:''}</section>`; shell(content,ch,l.id); bindLesson(ch,l); document.title=`${l.title} · Corpus gbprof`; window.scrollTo(0,0);}

function bindGlobal(){
 $$('.nav-btn,[data-route]').forEach(el=>el.addEventListener('click',()=>{location.hash=el.dataset.route; $('.sidebar')?.classList.remove('open')}));
 $('.mobile-menu')?.addEventListener('click',()=>$('.sidebar')?.classList.add('open')); $('.mobile-close')?.addEventListener('click',()=>$('.sidebar')?.classList.remove('open'));
 $('#themeBtn')?.addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';localStorage.setItem('theme',theme);document.documentElement.dataset.theme=theme==='dark'?'dark':'';route()});
 $('#fontUp')?.addEventListener('click',()=>setFont(.08)); $('#fontDown')?.addEventListener('click',()=>setFont(-.08)); $('#printBtn')?.addEventListener('click',()=>window.print());
 $('#searchBtn')?.addEventListener('click',()=>{const p=$('.search-panel');p.classList.toggle('hidden');if(!p.classList.contains('hidden'))setTimeout(()=>$('#searchInput').focus(),50)});
 $('#searchInput')?.addEventListener('input',e=>search(e.target.value));
 $('.search-panel')?.addEventListener('click',e=>{if(e.target.classList.contains('search-panel'))e.currentTarget.classList.add('hidden')});
 $('.map-modal button')?.addEventListener('click',()=>$('.map-modal').classList.add('hidden'));
 document.addEventListener('keydown',escapeHandler,{once:true});
}
function escapeHandler(e){if(e.key==='Escape'){$('.search-panel')?.classList.add('hidden');$('.map-modal')?.classList.add('hidden')} document.addEventListener('keydown',escapeHandler,{once:true})}
function setFont(delta){fontScale=Math.min(1.35,Math.max(.85,fontScale+delta));localStorage.setItem('fontScale',fontScale);document.documentElement.style.fontSize=(16*fontScale)+'px'}
function stripHTML(s){const d=document.createElement('div');d.innerHTML=s;return d.textContent||''}
function search(q){const box=$('.results');q=q.trim().toLowerCase();if(q.length<2){box.innerHTML='<div class="empty">Scrivi almeno due caratteri.</div>';return} const found=allLessons().filter(l=>(l.title+' '+stripHTML(l.body)+' '+JSON.stringify(l.tools||{})).toLowerCase().includes(q)).slice(0,20); box.innerHTML=found.length?found.map(l=>`<button class="result" data-route="#/chapter/${l.chapter.id}/${l.id}"><b>${l.title}</b><small>${l.chapter.title}</small></button>`).join(''):'<div class="empty">Nessun risultato.</div>'; $$('.result').forEach(el=>el.addEventListener('click',()=>{location.hash=el.dataset.route;$('.search-panel').classList.add('hidden')}))}
function bindLesson(ch,l){const all=ch.lessons;const i=all.findIndex(x=>x.id===l.id);$('.prev-btn')?.addEventListener('click',()=>{if(i>0)location.hash=`#/chapter/${ch.id}/${all[i-1].id}`});$('.next-btn')?.addEventListener('click',()=>{if(i<all.length-1)location.hash=`#/chapter/${ch.id}/${all[i+1].id}`});$('.complete-btn')?.addEventListener('click',e=>{if(completed.has(l.id))completed.delete(l.id);else completed.add(l.id);localStorage.setItem('completedLessons',JSON.stringify([...completed]));e.currentTarget.classList.toggle('done');e.currentTarget.textContent=completed.has(l.id)?'✓ Studiata':'Segna come studiata'});$$('.map-open').forEach(b=>b.addEventListener('click',()=>{const m=$('.map-modal');m.querySelector('img').src=b.dataset.map;m.classList.remove('hidden')}));}
window.addEventListener('hashchange',route);route();
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script></body></html>
