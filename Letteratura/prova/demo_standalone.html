</style></head><body><div id="app" class="app"></div><noscript>Per consultare il sito è necessario attivare JavaScript.</noscript><script>window.SITE_DATA = {"chapters": [{"id": "europeo", "title": "L’Illuminismo europeo", "subtitle": "Ragione critica, nuovi pubblici e forme della letteratura", "question": "Se il mondo non è già ordinato per il meglio, gli esseri umani possono comprenderlo e cambiarlo?", "lessons": [{"id": "europeo-apertura-una-scossa-nel-migliore-dei-mondi-possibili", "title": "Apertura · Una scossa nel “migliore dei mondi possibili”", "kind": "main", "body": "<p class=\"lead\">Il mattino del 1º novembre 1755 Lisbona fu colpita da un violento terremoto, seguito da incendi e da un maremoto. La distruzione di una grande capitale cattolica, avvenuta nel giorno di Ognissanti, non fu percepita soltanto come una catastrofe naturale. Divenne immediatamente un problema europeo: come conciliare tanto dolore con l’idea di un ordine provvidenziale? Era legittimo attribuire il disastro alla punizione divina? Quanto dipendeva dalla natura e quanto dalle scelte umane, come l’urbanizzazione, la qualità degli edifici e la gestione dell’emergenza?</p>\n<p>Voltaire reagì contro l’ottimismo filosofico secondo cui tutto concorrerebbe necessariamente al bene nell’ordine complessivo dell’universo. Rousseau, pur criticando anch’egli le spiegazioni facili, osservò che la concentrazione della popolazione e le forme della vita urbana avevano aggravato le conseguenze del sisma. Il disaccordo è importante: i due autori non sostituirono semplicemente una risposta religiosa con una risposta scientifica, ma trasformarono la catastrofe in una discussione pubblica sulla natura, sulla responsabilità e sui limiti della ragione umana.</p>\n<p>L’episodio condensa un tratto fondamentale del Settecento: un avvenimento non viene più accolto soltanto entro una spiegazione ricevuta, ma è sottoposto al confronto tra ipotesi diverse. Il sapere diventa discussione; la letteratura partecipa alla discussione mediante poesia, lettere, racconti e ironia. Il terremoto di Lisbona non “creò” l’Illuminismo, ma ne rese visibile il metodo: interrogare, confrontare, rendere pubbliche le ragioni.</p>\n<aside class=\"callout anthology\"><span class=\"callout-label\">Rimando Antologico</span><p>Voltaire, Candido: l’arrivo a Lisbona e l’auto-da-fé. Il racconto non espone una teoria in forma astratta; mostra l’assurdità di una spiegazione attraverso la successione rapida e ironica degli eventi.</p></aside>", "tools": {"summary": "Il terremoto di Lisbona rende visibile il metodo illuministico: un evento non viene spiegato con una risposta unica e ricevuta, ma diventa oggetto di confronto pubblico tra ipotesi sulla natura, la provvidenza e la responsabilità umana.", "essentials": ["Il sisma del 1755 fu anche un problema filosofico europeo.", "Voltaire rifiuta l’ottimismo metafisico; Rousseau insiste anche sulle responsabilità sociali.", "La letteratura partecipa al dibattito attraverso poesia, lettere, racconto e ironia."], "vocab": [["Teodicea", "Tentativo di conciliare il male con la bontà e la giustizia divine."], ["Ottimismo filosofico", "Idea che l’ordine complessivo dell’universo concorra necessariamente al bene."], ["Responsabilità", "Ricerca della parte umana nelle conseguenze di un evento naturale."]], "anthology": [["Voltaire", "Candido", "L’arrivo a Lisbona e l’auto-da-fé", "Mostra con l’ironia il fallimento delle spiegazioni astratte."]], "questions": ["Perché il terremoto divenne un problema filosofico?", "In che cosa differiscono le reazioni di Voltaire e Rousseau?", "Che cosa significa trasformare un evento in discussione pubblica?"], "map": ["Lisbona 1755", ["catastrofe naturale", "crisi dell’ottimismo", "confronto Voltaire–Rousseau", "responsabilità umana", "letteratura come critica"]], "gbprof": "Lisbona 1755: quando un terremoto mette sotto processo un’idea del mondo", "mapFile": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC ico assolutismo europeo: l’autorità dei sovrani assumeva forme diverse in Francia, negli Stati tedeschi, nell’Impero asburgico, in Russia e nelle monarchie iberiche.</p>\n<p>L’unità religiosa, perseguita per secoli dagli Stati confessionali, era stata incrinata dalle guerre di religione e dalla pluralità delle confessioni cristiane. Censura ecclesiastica e censura civile continuavano a controllare la stampa; tuttavia manoscritti, traduzioni, edizioni clandestine e libri stampati all’estero attraversavano i confini. La circolazione non cancellava i divieti: li rendeva più difficili da applicare e spingeva gli scrittori a usare anonimato, pseudonimi e finzioni editoriali.</p>\n<p>Intanto cresceva il peso economico e culturale di mercanti, professionisti, funzionari e lettori urbani. L’espansione dei commerci, l’aumento delle pubblicazioni e la nascita di nuovi periodici non produssero una società moderna già compiuta, ma modificarono il rapporto fra sapere e pubblico. La cultura non rimase confinata alle università, alle corti e alle istituzioni religiose: raggiunse caffè, teatri, salotti, accademie e società di lettura.</p>\n<aside class=\"callout keyword\"><span class=\"callout-label\">Parola Chiave</span><p>Con questa espressione, affermatasi durante la Rivoluzione francese, si indica l’insieme degli ordinamenti politici e sociali europei precedenti alle rivoluzioni: monarchie dinastiche, società dei privilegi, poteri territoriali e legami confessionali. Non era un sistema identico in tutta Europa.</p></aside>\n<h2>2. Le radici scientifiche e filosofiche</h2>\n<p>Molti strumenti dei Lumi maturarono nel tardo Seicento. La rivoluzione scientifica aveva mostrato che i fenomeni naturali potevano essere descritti mediante osservazioni, esperimenti, calcoli e leggi. Nei Principi matematici della filosofia naturale del 1687 Isaac Newton elaborò una spiegazione unitaria del moto terrestre e celeste. Il successo della fisica newtoniana alimentò la fiducia nella possibilità di conoscere un universo ordinato, ma non trasformò automaticamente la scienza in ateismo: per Newton lo studio della natura conservava anche un significato religioso.</p>\n<p>John Locke attribuì all’esperienza un ruolo decisivo nella formazione delle idee e rifletté sui limiti della conoscenza umana. In campo politico sostenne l’esistenza di diritti che il governo non può violare e giustificò il potere come risultato di un patto, non come proprietà incondizionata del sovrano. Nella Lettera sulla tolleranza limitò la coercizione sulle coscienze, pur senza giungere alla moderna uguaglianza religiosa.</p>\n<p>Pierre Bayle trasformò l’erudizione in esercizio critico. Nel Dizionario storico e critico mise a confronto fonti, errori e tradizioni, mostrando quanto fosse fragile una verità fondata soltanto sull’autorità. Newton, Locke e Bayle non vanno semplicemente etichettati come illuministi: furono soglie del nuovo secolo. Dalla loro opera derivavano tre domande destinate a diventare centrali: come sappiamo ciò che crediamo di sapere? Chi può sottoporre una tradizione al controllo? Fino a che punto l’autorità può imporre una verità?</p>\n<aside class=\"callout note\"><span class=\"callout-label\">Precisazione</span><p>La scienza non sostituì in un solo colpo la religione e l’esperienza non cancellò la ragione. Nel Settecento convissero metodi, fedi e filosofie differenti. L’Illuminismo nacque da questa pluralità, non da una conversione collettiva a una dottrina unica.</p></aside>\n<h2>3. Che cosa chiamiamo Illuminismo</h2>\n<p>Le parole con cui oggi indichiamo il movimento non ebbero ovunque lo stesso significato né la stessa diffusione. In Francia si parlò di lumi; in area tedesca di Aufklärung, cioè rischiaramento; nel mondo inglese Enlightenment divenne una denominazione storiografica più tardi. Gli autori settecenteschi sapevano di appartenere a una stagione di discussione e riforma, ma non condividevano un manifesto comune.</p>\n<p>Per questo è corretto parlare di Illuminismo al singolare soltanto se si riconosce la pluralità degli Illuminismi. Esistevano reti transnazionali, traduzioni, corrispondenze e temi condivisi: critica dell’autorità, utilità del sapere, tolleranza, riforma delle leggi, confronto fra società. Tuttavia la cultura francese dei philosophes non coincideva con la scienza dell’uomo scozzese, con il saggio periodico britannico, con l’Aufklärung tedesca o con il riformismo italiano.</p>\n<p>Il termine philosophe indicava soprattutto un intellettuale che interveniva sui problemi del proprio tempo. Non era necessariamente un professore di filosofia: poteva essere narratore, storico, giurista, giornalista, scienziato o autore teatrale. Ciò che lo definiva era la volontà di rendere pubblica la critica e di collegare il sapere alla vita civile.</p>\n<aside class=\"callout question\"><span class=\"callout-label\">Questione Storiografica</span><p>Uno o molti Illuminismi? La formula più equilibrata è “una costellazione di Illuminismi collegati”: abbastanza uniti da condividere problemi e reti, abbastanza differenti da non poter essere ridotti a una sola dottrina.</p></aside>", "tools": {"summary": "L’Illuminismo nasce entro l’Antico Regime e non fuori di esso. Rivoluzione scientifica, empirismo, critica erudita, crescita della stampa e nuovi pubblici preparano una costellazione europea di movimenti collegati ma non identici.", "essentials": ["L’Antico Regime non era uguale in tutta Europa.", "Newton, Locke e Bayle sono radici decisive, non una “scuola illuministica” già compiuta.", "È corretto parlare di una pluralità di Illuminismi con problemi e reti comuni.", "Il philosophe è un intellettuale che interviene nella vita civile."], "vocab": [["Antico Regime", "Società dei privilegi, monarchie dinastiche e legami confessionali precedenti alle rivoluzioni."], ["Empirismo", "Orientamento che attribuisce all’esperienza un ruolo decisivo nella conoscenza."], ["Philosophe", "Intellettuale che rende pubblica la critica e collega sapere e vita civile."], ["Aufklärung", "Termine tedesco che significa rischiaramento."]], "anthology": [["John Locke", "Lettera sulla tolleranza", "Limiti della coercizione religiosa", "Collega libertà di coscienza e limiti del potere."], ["Pierre Bayle", "Dizionario storico e critico", "Una voce costruita sul confronto delle fonti", "Fa vedere l’erudizione come esercizio critico."], ["Immanuel Kant", "Che cos’è l’Illuminismo?", "Minorità e uso pubblico della ragione", "Offre una definizione tarda e problematica del movimento."]], "questions": ["Perché l’Illuminismo non nasce in una società già moderna?", "Quali domande comuni derivano da Newton, Locke e Bayle?", "Che cosa unisce e che cosa distingue i diversi Illuminismi?"], "map": ["Origini dei Lumi", ["Antico Regime", "rivoluzione scientifica", "empirismo e critica", "stampa e nuovi pubblici", "pluralità europea"]], "gbprof": "Dall’autorità alla verifica: come nasce un nuovo modo di pensare", "mapFile": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjAwIiBoZWlnaHQ9IjcyMCIgdmlld0JveD0iMCAwIDEyMDAgNzIwIiByb2xlPSJpbWciIGFyaWEtbGFiZWxsZWRieT0idGl0bGUgZGVzYyI+Cjx0aXRsZSBpZD0idGl0bGUiPk1hcHBhIGNvbmNldHR1YWxlOiBPcmlnaW5pIGRlaSBMdW1pPC90aXRsZT48ZGVzYyBpZD0iZGVzYyI+T3JpZ2luaSBkZWkgTHVtaSBjb2xsZWdhdG8gYSBBbnRpY28gUmVnaW1lLCByaXZvbHV6aW9uZSBzY2llbnRpZmljYSwgZW1waXJpc21vIGUgY3JpdGljYSwgc3RhbXBhIGUgbnVvdmkgcHViYmxpY2ksIHBsdXJhbGl0w6AgZXVyb3BlYTwvZGVzYz4KPGRlZnM+PG1hcmtlciBpZD0iYXJyb3ciIG1hcmtlcldpZHRoPSIxMCIgbWFya2VySGVpZ2h0PSIxMCIgcmVmWD0iOCIgcmVmWT0iMyIgb3JpZW50PSJhdXRvIiBtYXJrZXJVbml0cz0ic3Ryb2tlV2lkdGgiPjxwYXRoIGQ9Ik0wLDAgTDAsNiBMOSwzIHoiIGZpbGw9IiM2OTgxN2YiLz48L21hcmtlcj48ZmlsdGVyIGlkPSJzaGFkb3ciIHg9Ii0yMCUiIHk9Ii0yMCUiIHdpZHRoPSIxNDAlIiBoZWlnaHQ9IjE0MCUiPjxmZURyb3BTaGFkb3cgZHg9IjAiIGR5PSI1IiBzdGREZXZpYXRpb249IjgiIGZsb29kLW9wYWNpdHk9Ii4xMyIvPjwvZmlsdGVyPjwvZGVmcz4KPHJlY3Qgd2lkdGg9IjEyMDAiIGhlaWdodD0iNzIwIiByeD0iMzYiIGZpbGw9IiNmN2YzZTgiLz4KPHRleHQgeD0iNjAiIHk9IjY2IiBmb25 "main", "body": "<h2>4. Ragione, esperienza e critica</h2>\n<p>L’espressione “culto della ragione” è efficace ma ingannevole. La ragione illuministica non fu una nuova divinità né un metodo identico per tutti. Fu soprattutto la pretesa che credenze, istituzioni e tradizioni potessero essere sottoposte all’esame, alla discussione e alla prova delle conseguenze. Ragionare significava confrontare fonti, distinguere fatti e opinioni, riconoscere i limiti della conoscenza e rendere pubbliche le argomentazioni.</p>\n<p>L’esperienza aveva un ruolo centrale nelle tradizioni britanniche. David Hume applicò l’indagine empirica alla natura umana e mostrò che passioni, abitudini e sentimenti partecipano alla formazione dei giudizi. La morale non nasce soltanto da deduzioni astratte. Adam Smith, nella Teoria dei sentimenti morali, pose al centro la simpatia: la capacità di immaginare la situazione altrui e di valutare noi stessi attraverso lo sguardo degli altri.</p>\n<p>Anche nella cultura francese la ragione conviveva con sensibilità e passioni. Diderot diffidava dei sistemi troppo rigidi e preferiva spesso dialoghi, paradossi e narrazioni capaci di mostrare il movimento del pensiero. Rousseau criticò una civiltà che accresce le conoscenze senza rendere necessariamente migliori gli esseri umani. L’opposizione scolastica “Illuminismo uguale ragione, Romanticismo uguale sentimento” cancella dunque una parte essenziale del Settecento.</p>\n<aside class=\"callout warning\"><span class=\"callout-label\">Errore Da Evitare</span><p>Gli illuministi non sostenevano tutti le stesse idee e non consideravano il sentimento un nemico della conoscenza. Ragione, esperienza, passioni e sensibilità furono strumenti differenti, talvolta concorrenti, per comprendere l’essere umano.</p></aside>\n<h2>5. Natura, progresso e perfettibilità</h2>\n<p>La natura assunse significati diversi. Era l’ordine fisico studiato dalle scienze, ma anche un termine di confronto usato per giudicare istituzioni, religioni e costumi. Parlare di diritto naturale significava sostenere che alcune esigenze di giustizia fossero superiori alle leggi positive. Tuttavia nessuna definizione di natura era neutrale: ciò che un autore presentava come naturale poteva essere contestato da un altro come prodotto della storia o del potere.</p>\n<p>La crescita delle conoscenze alimentò l’idea di progresso. Tecniche, educazione e riforme sembravano capaci di migliorare la condizione umana. Ma il Settecento non condivise una fede uniforme nel miglioramento. Nel Discorso sulle scienze e le arti Rousseau domandò se l’avanzamento culturale avesse davvero reso gli uomini più virtuosi; nel Discorso sull’origine della disuguaglianza interpretò la perfettibilità come capacità ambivalente: rende possibile lo sviluppo, ma anche la dipendenza, la competizione e la corruzione.</p>\n<p>La perfettibilità non è quindi la perfezione. Indica la possibilità umana di trasformarsi. Può sostenere progetti educativi e politici, ma non garantisce che ogni trasformazione sia positiva. Questa tensione impedisce di ridurre l’Illuminismo a un ottimismo ingenuo e fa di Rousseau non un avversario esterno, bensì un critico interno dei Lumi.</p>\n<aside class=\"callout anthology\"><span class=\"callout-label\">Rimando Antologico</span><p>Rousseau, Discorso sull’origine della disuguaglianza: il passo sull’uomo che recinta un terreno consente di discutere proprietà, convenzione e nascita della società senza scambiarlo per una cronaca storica delle origini.</p></aside>\n<h2>6. Religione, tolleranza e libertà di coscienza</h2>\n<p>La critica illuministica colpì il fanatismo, l’intolleranza e l’uso politico dell’autorità religiosa. Ciò non significa che gli illuministi fossero tutti atei. Alcuni aderivano al deismo, cioè ammettevano un Dio conoscibile attraverso la ragione e l’ordine naturale senza accettare integralmente dogmi e rivelazioni particolari. Altri erano scettici, materialisti o apertamente atei. Esistettero anche Illuminismi religiosi, protestanti, cattolici ed ebraici, impegnati a conciliare fede, ragione e riforma.</p>\n<p>Voltaire combatté il fanatismo e le persecuzioni, ma non fu un materialista ateo. Lessing trasformò il pluralismo religioso in problema teatrale. Nel Nathan il saggio la parabola dei tre anelli non dimostra quale religione sia vera: sposta la verifica dal possesso di una verità esclusiva agli effetti morali delle diverse fedi. La tolleranza settecentesca rimase però spesso limitata: tollerare qualcuno non significava necessariamente riconoscergli piena uguaglianza civile.</p>\n<p>Il concetto moderno di libertà di coscienza si formò attraverso conflitti e passaggi graduali. Il contributo dei Lumi consiste nell’aver reso più difficile giustificare la coercizione soltanto con l’autorità della tradizione. Ma la pluralità delle posizioni invita a evitare una nuova ortodossia scolastica: religione e Illuminismo non furono termini semplicemente incompatibili.</p>\n<aside class=\"callout keyword\"><span class=\"callout-label\">Parole Da Distinguere</span><p>Anticlericalismo: critica del potere del clero. Deismo: fede razionale in Dio. Materialismo: spiegazione naturale e materiale della realtà. Ateismo: negazione dell’esistenza divina. Tolleranza: limitazione della coercizione; non ancora piena uguaglianza.</p></aside>\n<h2>7. Felicità, utilità e riforma della società</h2>\n<p>Il sapere illuministico rivendicò una funzione pubblica. Una conoscenza utile non era semplicemente redditizia: doveva contribuire a rendere più razionali l’educazione, le leggi, l’economia, l’amministrazione e i costumi. La felicità entrò nel lessico politico come criterio con cui valutare il governo. Non si trattava soltanto della felicità privata, ma della felicità pubblica, cioè delle condizioni collettive che permettono agli individui di vivere con maggiore sicurezza, libertà e dignità.</p>\n<p>Da questa prospettiva nacquero programmi differenti. Alcuni intellettuali collaborarono con sovrani riformatori; altri elaborarono teorie della sovranità popolare; altri ancora concentrarono l’attenzione sulle leggi, sul commercio, sull’istruzione o sulla tolleranza. Il riformismo non fu dunque una politica unica. Condivideva però l’idea che istituzioni storiche e convenzioni potessero essere confrontate con criteri razionali e modificate.</p>\n<aside class=\"callout question\"><span class=\"callout-label\">Domanda Di Ragionamento</span><p>Felicità individuale e felicità pubblica coincidono sempre? Il problema attraversa l’intero secolo: una società può dichiararsi prospera mentre mantiene privilegi, esclusioni e forme di dipendenza.</p></aside>", "tools": {"summary": "La ragione dei Lumi è soprattutto esame critico, non culto astratto. Esperienza, passioni e sensibilità entrano nella conoscenza; progresso e perfettibilità restano possibilità ambivalenti; tolleranza, utilità e felicità pubblica diventano criteri di riforma.", "essentials": ["Ragione e sentimento non sono opposti assoluti.", "La perfettibilità indica capacità di trasformazione, non garanzia di progresso.", "Gli illuministi assumono posizioni religiose diverse.", "La felicità pubblica diventa un criterio per giudicare istituzioni e governi."], "vocab": [["Ragione critica", "Facoltà di esaminare credenze e istituzioni con argomenti e confronto."], ["Perfettibilità", "Capacità umana di trasformarsi con esiti positivi o negativi."], ["Deismo", "Fede in un Dio conoscibile mediante ragione e natura."], ["Tolleranza", "Limitazione della coercizione sulle coscienze, non ancora piena uguaglianza."], ["Felicità pubblica", "Condizioni collettive di sicurezza, libertà e dignità."]], "anthology": [["Jean-Jacques Rousseau", "Discorso sull’origine della disuguaglianza", "Il primo recinto", "Interroga proprietà, convenzione e nascita della società."], ["Voltaire", "Trattato sulla tolleranza", "Il caso Calas", "Trasforma un’ingiustizia in battaglia civile."], ["Gotthold E. Lessing", "Nathan il saggio", "La parabola dei tre anelli", "Drammatizza la tolleranza senza ridurla a slogan."]], "questions": ["Perché “culto della ragione” è una formula insufficiente?", "In che senso Rousseau è un critico interno dei Lumi?", "Felicità individuale e felicità pubblica coincidono sempre?"], "map": ["Valori dei Lumi", ["ragione critica", "esperienza e passioni", "perfettibilità", "tolleranza", "utilità e felicità pubblica"]], "gbprof": "Ragione, sentimento e felicità: il Settecento oltre gli stereotipi", "mapFile": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjAwIiBoZWlnaHQ9IjcyMCIgdmlld0JveD0iMCAwIDEyMDAgNzIwIiByb2xlPSJpbWciIGFyaWEtbGFiZWxsZWRieT0idGl0bGUgZGVzYyI+Cjx0aXRsZSBpZD0idGl0bGUiPk1hcHBhIGNvbmNldHR1YWxlOiBWYWxvcmkgZGVpIEx1bWk8L3RpdGxlPjxkZXNjIGlkPSJkZXNjIj5WYWxvcmkgZGVpIEx1bWkgY29sbGVnYXRvIGEgcmFnaW9uZSBjcml0aWNhLCBlc3BlcmllbnphIGUgcGFzc2lvbmksIHBlcmZldHRpYmlsaXTDoCwgdG9sbGVyYW56YSwgdXRpbGl0w6AgZSBmZWxpY2l0w6AgcHViYmxpY2E8L2Rlc2M+CjxkZWZzPjxtYXJrZXIgaWQ9ImFycm93IiBtYXJrZXJXaWR0aD0iMTAiIG1hcmtlckhlaWdodD0iMTAiIHJlZlg9IjgiIHJlZlk9IjMiIG9yaWVudD0iYXV0byIgbWFya2VyVW5pdHM9InN0cm9rZVdpZHRoIj48cGF0aCBkPSJNMCwwIEwwLDYgTDksMyB6IiBmaWxsPSIjNjk4MTdmIi8+PC9tYXJrZXI+PGZpbHRlciBpZD0ic2hhZG93IiB4PSItMjAlIiB5PSItMjAlIiB3aWR0aD0iMTQwJSIgaGVpZ2h0PSIxNDAlIj48ZmVEcm9wU2hhZG93IGR4PSIwIiBkeT0iNSIgc3RkRGV2aWF0aW9uPSI4IiBmbG9vZC1vcGFjaXR5PSIuMTMiLz48L2ZpbHRlcj48L2RlZnM+CjxyZWN0IHdpZHRoPSIxMjAwIiBoZWlnaHQ9IjcyMCIgcng9IjM2IiBmaWxsPSIjZjdmM2U4Ii8+Cjx0ZXh0IHg9IjYwIiB5PSI2NiIgZm9udC1mYW1pbHk9IkFyaWFsLCBzYW5zLXNlcmlmIiBmb250LXNpemU9IjI2IiBmb250LXdlaWdodD0iNzAwIiBmaWxsPSIjMjQzNzM1Ij5NQVBQQSBDT05DRVRUVUFMRTwvdGV4dD4KPGxpbmUgeDE9IjYwMCIgeTE9IjM2MCIgeDI9IjYwMC4wIiB5Mj0iMTE1LjAiIHN0cm9rZT0iIzY5ODE3ZiIgc3Ryb2tlLXdpZHRoPSI0IiBtYXJrZXItZW5kPSJ1cmwoI2Fycm93KSIvPgo8bGluZSB4MT0iNjAwIiB5MT0iMzYwIiB4Mj0iOTk5LjQ0MzczNjg0Mzk2NDQiIHkyPSIyODQuMjkwODM2Mzc4MTM3OSIgc3Ryb2tlPSIjNjk4MTdmIiBzdHJva2Utd2lkdGg9IjQiIG1hcmtlci1lbmQ9InVybCgjYXJyb3cpIi8+CjxsaW5lIHgxPSI2MDAiIHkxPSIzNjAiIHgyPS enza continuavano a determinare forti differenze. Tuttavia la discussione culturale raggiunse pubblici più ampi e divenne meno dipendente dalla sola protezione di corti e mecenati. Editori, librai, traduttori, recensori e giornalisti acquistarono un ruolo decisivo.</p>\n<p>L’opinione pubblica non era una specie di assemblea universale. Era un insieme mobile di giudizi prodotti dalla stampa, dalla conversazione e dalle pratiche di lettura. Un autore poteva indirizzarsi a lettori che non conosceva personalmente; i lettori potevano commentare, rispondere, imitare e diffondere. Il pubblico, in questo senso, non preesisteva ai mezzi di comunicazione: veniva costruito dai periodici, dai teatri, dalle società di lettura e dalla stessa immagine che gli scrittori offrivano dei propri destinatari.</p>\n<p>La censura accompagnò questa espansione. Molte opere circolarono anonime, con falsi luoghi di stampa o attraverso editori stranieri. Le Lettere persiane furono pubblicate anonime; Candido apparve attribuito a un inesistente “dottor Ralph”; Diderot lasciò inediti alcuni testi più rischiosi. Il vincolo favorì strategie indirette: viaggi immaginari, personaggi ingenui, ironia, dialoghi e racconti che potevano criticare senza adottare il tono di un manifesto.</p>\n<aside class=\"callout warning\"><span class=\"callout-label\">Non Era Internet</span><p>Il paragone con i social network può essere utile soltanto fino a un punto. La comunicazione settecentesca era lenta, costosa, selettiva e controllata. La novità non consisteva nell’accesso universale, ma nella crescita di circuiti capaci di oltrepassare corti, università e confini politici.</p></aside>\n<h2>9. Salotti, caffè, accademie, teatri e logge</h2>\n<p>I luoghi della sociabilità contribuirono a dare forma ai nuovi pubblici. Nei salons parigini aristocratici, letterati e filosofi si incontravano sotto la regia di salonnières capaci di selezionare ospiti e orientare conversazioni. Nei caffè si leggevano giornali, si discutevano notizie e si intrecciavano relazioni commerciali e culturali. Accademie e società scientifiche promuovevano concorsi e pubblicazioni; i teatri trasformavano gli spettatori in un pubblico visibile; le logge massoniche favorivano reti sovralocali.</p>\n<p>Questi spazi non erano democrazie in miniatura. L’accesso dipendeva da ricchezza, status, istruzione e relazioni. Le donne ebbero talvolta un ruolo rilevante come organizzatrici e autrici, ma rimasero escluse da molte istituzioni. I ceti popolari partecipavano in forme differenti e meno documentate. Parlare di sfera pubblica significa quindi riconoscere un ampliamento reale, senza nasconderne i confini.</p>\n<aside class=\"callout profile\"><span class=\"callout-label\">Profilo · Madame Geoffrin</span><p>Marie-Thérèse Geoffrin ospitò uno dei più influenti salons parigini. Il suo ruolo mostra che la cultura dei Lumi dipese anche da mediazioni, reti e competenze sociali, non soltanto dai libri dei grandi autori.</p></aside>\n<h2>10. L’Enciclopedia: sapere, immagini e lavoro</h2>\n<p>L’Encyclopédie, diretta da Denis Diderot e Jean-Baptiste d’Alembert, fu pubblicata tra il 1751 e il 1772 in diciassette volumi di testo e undici volumi di tavole. Riunì migliaia di voci e numerosi collaboratori. Non era un deposito neutrale di informazioni: proponeva un ordine dei saperi, metteva in relazione discipline differenti e affidava ai rinvii interni una funzione critica. Una voce apparentemente innocua poteva condurre il lettore verso un’altra capace di mettere in discussione un dogma o un’istituzione.</p>\n<p>Le tavole dedicate alle arti e ai mestieri avevano un significato particolare. Rendevano visibili strumenti, gesti e processi produttivi spesso esclusi dal sapere erudito. Il lavoro manuale entrava nell’architettura della conoscenza accanto alle scienze e alle arti liberali. Ciò non eliminava le gerarchie sociali, ma modificava il modo di rappresentare l’utilità e la dignità delle competenze tecniche.</p>\n<p>L’opera affrontò sospensioni, condanne e controlli. La sua realizzazione fu quindi anche una vicenda editoriale: raccolta di finanziamenti, coordinamento dei collaboratori, produzione di immagini, rapporto con sottoscrittori e censori. L’Encyclopédie dimostra che una forma editoriale può essere essa stessa un progetto culturale.</p>\n<aside class=\"callout activity\"><span class=\"callout-label\">Laboratorio Visuale</span><p>Osserva una tavola dedicata a un mestiere. Distingui ambiente, strumenti, sequenza delle operazioni e prodotti finali. Quale idea del sapere comunica l’immagine? Che cosa diventa conoscibile grazie alla rappresentazione visuale?</p></aside>", "tools": {"summary": "La crescita di libri, periodici e luoghi di sociabilità costruisce nuovi pubblici, ancora selettivi. Censura e circolazione clandestina favoriscono forme indirette; l’Encyclopédie organizza il sapere come impresa editoriale, visuale e civile.", "essentials": ["L’opinione pubblica è prodotta da stampa, conversazione e pratiche di lettura.", "Salotti, caffè, teatri e logge ampliano la discussione ma non sono spazi egualitari.", "La censura genera anonimato, pseudonimi, ironia e finzioni.", "Le tavole dell’Encyclopédie riconoscono dignità conoscitiva alle arti e ai mestieri."], "vocab": [["Opinione pubblica", "Insieme mobile di giudizi reso possibile da stampa e sociabilità."], ["Sociabilità", "Pratiche e luoghi in cui si formano relazioni e discussioni."], ["Censura", "Controllo civile o religioso sulla produzione e circolazione dei testi."], ["Enciclopedismo", "Organizzazione e diffusione sistematica dei saperi."]], "anthology": [["Addison e Steele", "The Spectator", "Un saggio di costume", "Mostra la nascita del lettore urbano e periodico."], ["Diderot e d’Alembert", "Encyclopédie", "Una voce con rinvii interni", "Fa vedere che l’ordine del sapere può avere una funzione critica."], ["Encyclopédie", "Tavole delle arti e dei mestieri", "Una sequenza di lavoro", "Permette un laboratorio visuale su s i scrittori cercarono chiarezza ed efficacia, ma ciò non significò povertà stilistica. Ironia, satira, paradosso, finzione editoriale e polifonia richiedevano lettori attivi. Il testo poteva essere breve e leggibile, ma non necessariamente semplice. Spesso il lettore doveva riconoscere la distanza fra ciò che un personaggio affermava e ciò che gli eventi mostravano, oppure confrontare prospettive senza ricevere una soluzione definitiva.</p>\n<p>Il nuovo rapporto con il pubblico modificò anche la figura dell’autore. Lo scrittore interveniva nella discussione civile, costruiva una reputazione, dialogava con recensori e lettori, affrontava il mercato e la censura. La celebrità letteraria di Voltaire e Rousseau anticipò alcuni tratti dell’autore moderno, esposto all’ammirazione, alla polemica e alla curiosità biografica.</p>\n<aside class=\"callout note\"><span class=\"callout-label\">Idea Centrale</span><p>La prosa dei Lumi tende a essere accessibile, ma non passiva. Chiede al lettore di completare il ragionamento, riconoscere l’ironia, confrontare le voci e sottoporre a verifica le proprie abitudini.</p></aside>\n<h2>12. I generi letterari dell’Illuminismo</h2>\n<h3>La lettera immaginaria e lo straniamento</h3>\n<p>Nelle Lettere persiane Montesquieu affidò a viaggiatori persiani lo sguardo sulla Francia. La distanza culturale rende strani costumi che il lettore francese considerava naturali. L’opera usa più corrispondenti, frammenta il racconto e alterna osservazioni comiche, critica politica e vicenda drammatica del serraglio. Il “persiano” non è una descrizione etnografica neutrale: è una costruzione letteraria europea. Proprio questa artificiosità consente lo straniamento, cioè la capacità di vedere dall’esterno ciò che l’abitudine rende invisibile.</p>\n<h3>Il racconto filosofico e la satira</h3>\n<p>Il racconto filosofico unisce rapidità narrativa e interrogazione delle idee. In Candido il protagonista attraversa guerre, persecuzioni, catastrofi e utopie. La ripetizione della formula secondo cui vivremmo “nel migliore dei mondi possibili” entra continuamente in contrasto con gli eventi. L’ironia nasce dalla secchezza della narrazione, dagli accumuli e dall’assenza di commenti morali enfatici. Il lettore non riceve una favola con una morale pacificata: assiste alla demolizione di spiegazioni incapaci di reggere l’esperienza.</p>\n<h3>Il dialogo e la polifonia</h3>\n<p>Diderot trasformò il dialogo in un laboratorio di instabilità. Nel Nipote di Rameau le voci di “Io” e “Lui” non coincidono semplicemente con verità ed errore. Il cinismo, il talento mimetico e le provocazioni del nipote mettono in difficoltà anche la posizione apparentemente ragionevole dell’interlocutore. In Jacques il fatalista il narratore interrompe il racconto, discute con il lettore e moltiplica digressioni. La polifonia impedisce di ricondurre il testo a una tesi unica e costringe a valutare le contraddizioni.</p>\n<h3>Il saggio periodico</h3>\n<p>Nel mondo britannico The Spectator di Addison e Steele costruì una lettura breve, seriale e quotidiana. Una persona editoriale osservava costumi, conversazioni, teatro, gusto e comportamenti urbani. Il periodico voleva portare la filosofia fuori dalle biblioteche, nei club, nei caffè e ai tavoli da tè. Non era ancora il quotidiano moderno d’informazione: combinava saggio morale, scena di costume, ironia e progetto educativo.</p>\n<h3>Il romanzo epistolare e la cultura del sentimento</h3>\n<p>Nella Nuova Eloisa Rousseau fece della corrispondenza un luogo di conoscenza morale. Le lettere non registrano soltanto emozioni: mostrano come desiderio, virtù, differenze sociali, educazione e paesaggio trasformino l’identità. La distanza temporale fra scrittura e risposta aumenta il coinvolgimento del lettore. Il grande successo dell’opera dimostra che la cultura dei Lumi non fu estranea alla sensibilità, alle lacrime e alla ricerca dell’autenticità.</p>\n<h3>Il teatro delle idee</h3>\n<p>In Nathan il saggio Lessing tradusse il problema della tolleranza in un conflitto scenico. La parabola dei tre anelli non offre una soluzione miracolosa: invita le diverse fedi a dimostrare il proprio valore attraverso la vita morale. Il teatro rende visibile la discussione e affida alle voci dei personaggi il compito di trasformare un principio astratto in riconoscimento reciproco.</p>\n<h3>L’autobiografia moderna</h3>\n<p>Nelle Confessioni Rousseau presentò la propria individualità come irriducibile e degna di essere narrata nei suoi errori, desideri e vergogne. La confessione non garantisce una trasparenza assoluta: memoria, selezione e auto-giustificazione costruiscono un’immagine dell’io. Il lettore è chiamato contemporaneamente a comprendere e a giudicare. Da questa tensione nasce uno dei modelli dell’autobiografia moderna.</p>\n<div class=\"table-wrap\"><table><thead><tr><th><strong>Forma</strong></th><th><strong>Tecnica dominante</strong></th><th><strong>Funzione</strong></th><th><strong>Opera esemplare</strong></th></tr></thead><tbody><tr><td>Lettera immaginaria</td><td>Voce straniera e pluralità di lettere</td><td>Rendere estranei i costumi abituali</td><td>Montesquieu, Lettere persiane</td></tr><tr><td>Racconto filosofico</td><td>Viaggio, episodi, ironia</td><td>Mettere alla prova un’idea</td><td>Voltaire, Candido</td></tr><tr><td>Dialogo</td><td>Voci contrapposte e ambiguità</td><td>Far pensare senza una tesi unica</td><td>Diderot, Il nipote di Rameau</td></tr><tr><td>Saggio periodico</td><td>Persona editoriale e serialità</td><td>Formare un pubblico quotidiano</td><td>Addison e Steele, The Spectator</td></tr><tr><td>Romanzo epistolare</td><td>Lettere, distanza, interiorità</td><td>Conoscere attraverso il sentimento</td><td>Rousseau, La nuova Eloisa</td></tr><tr><td>Teatro di idee</td><td>Dialogo scenico e parabola</td><td>Drammatizzare la tolleranza</td><td>Lessing, Nathan il saggio</td></tr><tr><td>Autobiografia</td><td>Memoria, confessione, autoanalisi</td><td>Costruire l’io come problema</td><td>Rousseau, Confessioni</td></tr></tbody></table></div>\n<h2>13. Cinque opere per comprendere i Lumi</h2>\n<h3>Montesquieu, Lettere persiane</h3>\n<p>Pubblicato anonimo nel 1721, il romanzo epistolare segue due viaggiatori persiani in Europa e mantiene, parallelamente, la corrispondenza con il serraglio lasciato in patria. Lo sguardo esterno relativizza istituzioni e costumi francesi; la pluralità delle lettere impedisce a una sola voce di dominare. La ribellione finale di Roxane mostra inoltre che la critica del dispotismo riguarda anche il potere privato e patriarcale.</p>\n<aside class=\"callout anthology\"><span class=\"callout-label\">Nella Seconda Parte</span><p>Una lettera di Rica sulla società parigina e l’ultima lettera di Roxane. La coppia permette di confrontare satira pubblica e conflitto privato.</p></aside>\n<h3>Voltaire, Candido</h3>\n<p>Pubblicato nel 1759 sotto pseudonimo, Candido è un racconto filosofico costruito come viaggio accelerato attraverso la violenza del mondo. Il precettore Pangloss continua a ripetere una teoria ottimistica mentre i fatti la smentiscono. La conclusione sul “coltivare il nostro giardino” non offre un sistema alternativo completo: oppone alla retorica metafisica una responsabilità concreta, limitata e operosa.</p>\n<aside class=\"callout anthology\"><span class=\"callout-label\">Nella Seconda Parte</span><p>Il terremoto e l’auto-da-fé di Lisbona; Eldorado; il finale. I tre passi mostrano rispettivamente satira, utopia e soluzione antiretorica.</p></aside>\n<h3>Diderot, Il nipote di Rameau</h3>\n<p>Scritto e rielaborato per anni, ma non pubblicato in vita dall’autore, il dialogo mette di fronte un “Io” riflessivo e un “Lui” istrionico, cinico e socialmente dipendente. Il nipote imita musicisti, cortigiani e parassiti, trasformando il corpo in teatro della società. Il testo non assegna facilmente la vittoria: la voce scandalosa rivela ipocrisie che la rispettabilità preferirebbe ignorare.</p>\n<aside class=\"callout anthology\"><span class=\"callout-label\">Nella Seconda Parte</span><p>L’incipit al Café de la Régence e una pantomima del nipote. Occorre conservare in traduzione la mobilità dei registri e la comicità argomentativa.</p></aside>\n<h3>Rousseau, La nuova Eloisa</h3>\n<p>Il romanzo epistolare del 1761 racconta l’amore fra Julie e il precettore Saint-Preux, ostacolato dalle differenze sociali e ricomposto entro un ordine morale complesso. Le lettere fanno del sentimento una forma di conoscenza e costruiscono una comunità immaginata di lettori partecipi. L’opera non è soltanto “lacrimosa”: interroga educazione, virtù, classe, famiglia, natura e autenticità.</p>\n<aside class=\"callout anthology\"><span class=\"callout-label\">Nella Seconda Parte</span><p>Una lettera amorosa iniziale e una lettera da Clarens: il confronto mostra il passaggio dalla passione individuale al progetto di ordine affettivo e sociale.</p></aside>\n<h3>Lessing, Nathan il saggio</h3>\n<p>Composto dopo che a Lessing fu impedito di proseguire una polemica teologica, il dramma del 1779 trasferisce sul palcoscenico il confronto fra ebraismo, cristianesimo e islam. Nella parabola dei tre anelli l’autenticità della fede non è dimostrabile attraverso il possesso di un oggetto originario: deve manifestarsi nella condotta. Il riconoscimento finale fra personaggi di religioni diverse traduce la tolleranza in relazione umana, senza cancellare la storia dei conflitti.</p>\n<aside class=\"callout anthology\"><span class=\"callout-label\">Nella Seconda Parte</span><p>La parabola dei tre anelli. Il brano va letto come racconto inserito nel dramma, non come slogan isolato.</p></aside>", "tools": {"summary": "Nei Lumi la forma letteraria produce pensiero: lo straniamento rende visibile l’abitudine, l’ironia verifica le teorie, la polifonia costringe a giudicare, la scrittura del sentimento esplora l’identità. Il lettore diventa parte attiva dell’argomentazione.", "essentials": ["La letteratura non è un contenitore passivo di idee.", "Ogni genere costruisce un diverso rapporto tra autore, lettore e problema.", "Ironia e polifonia impediscono una morale troppo facile.", "La cultura del sentimento appartiene pienamente al Settecento."], "vocab": [["Straniamento", "Tecnica che rende insolito ciò che appare abituale."], ["Racconto filosofico", "Narrazione breve che mette alla prova idee con viaggio e ironia."], ["Polifonia", "Presenza di voci non riducibili a una tesi unica."], ["Romanzo epistolare", "Romanzo costruito attraverso lettere che mostrano distanza e interiorità."], ["Autobiografia", "Scrittura in cui memoria e autoanalisi costruiscono l’io come problema."]], "anthology": [["Montesquieu", "Lettere persiane", "Rica a Parigi e l’ultima lettera di Roxane", "Confronta satira pubblica e conflitto privato."], ["Voltaire", "Candido", "Lisbona, Eldorado e finale", "Mostra satira, utopia e responsabilità concreta."], ["Diderot", "Il nipote di Rameau", "L’incipit e una pantomima", "Fa sperimentare dialogo, comicità e instabilità morale."], ["Rousseau", "La nuova Eloisa / Confessioni", "Sentimento e costruzione dell’io", "Mostra che sensibilità e conoscenza non sono separate."]], "questions": ["In che senso la forma fa “accadere” il pensiero?", "Quale ruolo ha il lettore nel racconto filosofico?", "Perché il dialogo di Diderot non consegna una tesi unica?"], "map": ["Letteratura dei Lumi", ["straniamento", "ironia e satira", "dialogo e polifonia", "periodico", "sentimento e autobiografia"]], "gbprof": "Quando la forma pensa: ironia, straniamento e lettore attivo", "mapFile": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjAwIiBoZWlnaHQ9IjcyMCIgdmlld0JveD0iMCAwIDEyMDAgNzIwIiByb2xlPSJpbWciIGFyaWEtbGFiZWxsZWRieT0idGl0bGUgZGVzYyI+Cjx0aXRsZSBpZD0idGl0bGUiPk1hcHBhIGNvbmNldHR1YWxlOiBMZXR0ZXJhdHVyYSBkZWkgTHVtaTwvdGl0bGU+PGRlc2MgaWQ9ImRlc2MiPkxldHRlcmF0dXJhIGRlaSBMdW1pIGNvbGxlZ2F0byBhIHN0cmFuaWFtZW50bywgaXJvbmlhIGUgc2F0aXJhLCBkaWFsb2dvIGU nte a una conversazione urbana. Locke e Hume offrirono strumenti per un’indagine della conoscenza e della natura umana fondata sull’esperienza.</p>\n<h3>Scozia: scienza dell’uomo e società commerciale</h3>\n<p>L’Illuminismo scozzese sviluppò una ricerca sulle passioni, sulla simpatia, sulle istituzioni e sulla storia della società. Hume, Smith, Ferguson e altri studiosi cercarono di comprendere come comportamenti individuali e regole collettive producano ordini sociali. Ridurre Smith al libero mercato significa separare artificialmente la Ricchezza delle nazioni dalla precedente Teoria dei sentimenti morali.</p>\n<h3>Area tedesca: educazione, tolleranza e ragione pubblica</h3>\n<p>L’Aufklärung si sviluppò in territori politicamente frammentati e religiosamente plurali. Lessing affidò al teatro e alla critica la lotta contro il dogmatismo; Moses Mendelssohn discusse emancipazione ebraica, tolleranza e rapporto fra religione e Stato; Kant formulò nel 1784 la celebre definizione dell’Illuminismo come uscita dalla minorità mediante l’uso pubblico della ragione. La formula kantiana è una testimonianza tarda e potente, non il riassunto definitivo di tutto il secolo.</p>\n<h3>Italia e monarchie riformatrici: un ponte</h3>\n<p>Milano, Napoli e Toscana furono centri importanti di riformismo civile, economico e giuridico. Il Caffè, Beccaria, i fratelli Verri e Genovesi saranno affrontati nel capitolo successivo, insieme al rapporto fra cultura illuministica e letteratura italiana. Nell’Impero asburgico, in Prussia, in Russia e in altri Stati europei alcuni sovrani adottarono riforme amministrative, scolastiche e religiose, selezionando però le idee compatibili con l’accentramento del potere.</p>\n<div class=\"table-wrap\"><table><thead><tr><th><strong>Area</strong></th><th><strong>Tema prevalente</strong></th><th><strong>Forme e strumenti</strong></th><th><strong>Figure guida</strong></th></tr></thead><tbody><tr><td>Francia</td><td>Critica dell’Antico Regime e del fanatismo</td><td>Racconto, dialogo, enciclopedia, satira</td><td>Montesquieu, Voltaire, Diderot, Rousseau</td></tr><tr><td>Gran Bretagna</td><td>Esperienza e riforma dei costumi</td><td>Saggio periodico, stampa, club e caffè</td><td>Locke, Addison, Steele, Hume</td></tr><tr><td>Scozia</td><td>Scienza dell’uomo e società commerciale</td><td>Trattato morale, storia e filosofia sociale</td><td>Hume, Smith, Ferguson</td></tr><tr><td>Area tedesca</td><td>Tolleranza, educazione e ragione pubblica</td><td>Teatro, saggio e polemica religiosa</td><td>Lessing, Mendelssohn, Kant</td></tr><tr><td>Italia</td><td>Riformismo civile, diritto ed economia</td><td>Periodico, saggio, trattato</td><td>Beccaria, Verri, Genovesi</td></tr></tbody></table></div>", "tools": {"summary": "I Lumi sono una rete transnazionale rielaborata in contesti diversi: in Francia prevalgono philosophes e critica indiretta; in Gran Bretagna empirismo e periodici; in Scozia la scienza dell’uomo; nell’area tedesca tolleranza, educazione e ragione pubblica.", "essentials": ["Le aree europee non sono compartimenti chiusi.", "Le forme letterarie dipendono anche da censura, istituzioni e pubblico.", "L’Illuminismo scozzese lega morale, società e storia.", "Kant non riassume tutto il secolo: ne offre una definizione tarda."], "vocab": [["Cosmopolitismo", "Appartenenza ideale a una comunità umana oltre i singoli Stati."], ["Scienza dell’uomo", "Indagine empirica su passioni, morale e istituzioni."], ["Ragione pubblica", "Uso della ragione rivolto a un pubblico e sottoposto a discussione."], ["Società commerciale", "Società organizzata attorno a scambi, lavoro e istituzioni economiche."]], "anthology": [["David Hume", "Ricerca sui principi della morale", "Sentimento morale e giudizio", "Mostra la specificità dell’Illuminismo scozzese."], ["Adam Smith", "Teoria dei sentimenti morali", "La simpatia", "Corregge la riduzione di Smith al solo interesse economico."], ["Immanuel Kant", "Che cos’è l’Illuminismo?", "Sapere aude e uso società commerciale</h3>\n<p>Adam Smith analizzò la divisione del lavoro, la formazione dei prezzi, il commercio e le istituzioni della società commerciale. Non sostenne che l’interesse privato produca sempre spontaneamente il bene comune. Criticò monopoli e collusioni, riconobbe gli effetti degradanti di un lavoro eccessivamente ripetitivo e attribuì allo Stato funzioni pubbliche. La sua economia resta collegata alla morale della simpatia e al problema del giudizio sociale.</p>\n<aside class=\"callout compare\"><span class=\"callout-label\">Confronto</span><p>Montesquieu cerca istituzioni moderate; Rousseau fonda la sovranità nel corpo politico; Smith studia i meccanismi morali ed economici della società commerciale. Sono risposte differenti a problemi differenti, non capitoli di una stessa dottrina.</p></aside>\n<h2>16. Riforme dall’alto e rivoluzioni</h2>\n<p>L’espressione “dispotismo illuminato” fu elaborata successivamente dagli storici per indicare alcune politiche riformatrici adottate da monarchi assoluti. Federico II di Prussia, Giuseppe II d’Asburgo, Caterina II di Russia e Pietro Leopoldo di Toscana promossero, con esiti diversi, riforme amministrative, scolastiche, giuridiche o religiose. Tali politiche potevano ridurre privilegi e razionalizzare lo Stato, ma rafforzavano contemporaneamente il controllo centrale e non riconoscevano la sovranità popolare.</p>\n<p>Anche il rapporto fra Illuminismo e rivoluzioni deve essere sottratto alle spiegazioni automatiche. Il linguaggio dei diritti, della sovranità e della felicità pubblica circolò nelle rivoluzioni americana e francese; tuttavia guerre, crisi fiscali, conflitti sociali e istituzioni politiche furono condizioni decisive. I rivoluzionari non applicarono semplicemente libri già scritti: selezionarono, trasformarono e radicalizzarono concetti illuministici.</p>\n<p>La Rivoluzione francese cambiò a sua volta il significato dei Lumi. Dopo il 1789 alcuni li interpretarono come origine dell’emancipazione moderna, altri come causa della dissoluzione dell’ordine. La storiografia continua a discutere il nesso. La formula più prudente è questa: l’Illuminismo fornì linguaggi e problemi alle rivoluzioni, ma non ne fu una causa unica né sufficiente.</p>\n<aside class=\"callout warning\"><span class=\"callout-label\">Errore Da Evitare</span><p>“I filosofi fecero la Rivoluzione francese” è una scorciatoia. Le idee agiscono soltanto quando vengono adottate da gruppi sociali, inserite in conflitti e trasformate dagli eventi.</p></aside>\n<h2>17. Universalismo e limiti dei Lumi</h2>\n<p>Il richiamo all’umanità universale aprì possibilità nuove, ma non incluse automaticamente ogni essere umano. Le donne parteciparono alla cultura dei Lumi come autrici, traduttrici, scienziate e organizzatrici di reti, mentre rimasero escluse da molte istituzioni educative e politiche. Émilie du Châtelet contribuì autonomamente alla filosofia naturale e alla diffusione di Newton; Mary Wollstonecraft applicò il linguaggio dei diritti alla subordinazione educativa delle donne, mettendo in evidenza l’incoerenza di un universale limitato agli uomini.</p>\n<p>Schiavitù e imperi coloniali attraversavano l’economia e la cultura europee. Alcuni illuministi criticarono conquista e schiavitù; altri accettarono gerarchie di civiltà o elaborarono classificazioni razziali. Le stesse opere possono contenere tensioni fra principi universalistici e pregiudizi. Non è corretto né assolvere l’intero movimento come origine pura dei diritti né condannarlo come semplice ideologia del dominio.</p>\n<p>La contraddizione è storicamente produttiva: una volta formulato un principio universale, i soggetti esclusi possono usarlo per contestare i confini dell’inclusione. Wollstonecraft non abbandona il linguaggio illuministico; lo porta contro una delle sue limitazioni. L’universale è quindi insieme promessa e campo di conflitto.</p>\n<aside class=\"callout profile\"><span class=\"callout-label\">Profili</span><p>Émilie du Châtelet: filosofa naturale e interprete di Newton. Mary Wollstonecraft: autrice della Rivendicazione dei diritti della donna del 1792. Presentarle soltanto come eccezioni femminili sarebbe riduttivo: mostrano due settori centrali dei Lumi, scienza ed educazione civile.</p></aside>", "tools": {"summary": "Montesquieu, Rousseau e Smith elaborano risposte diverse su libertà, sovranità e società commerciale. Le riforme dall’alto non coincidono con la democrazia; le rivoluzioni usano e trasformano linguaggi illuministici. L’universalismo dei Lumi resta attraversato da esclusioni.", "essentials": ["Montesquieu cerca moderazione e sicurezza contro l’arbitrio.", "Rousseau fonda la sovranità nel corpo dei cittadini.", "Il dispotismo illuminato riforma ma non riconosce sovranità popolare.", "Le idee non causano meccanicamente le rivoluzioni.", "Universalismo e subordinazioni di genere e coloniali convivono in tensione."], "vocab": [["Moderazione", "Equilibrio istituzionale che limita l’arbitrio del potere."], ["Volontà generale", "Volontà orientata al bene comune, non somma di preferenze private."], ["Dispotismo illuminato", "Riforme promosse da monarchi assoluti senza sovranità popolare."], ["Universalismo", "Pretesa di formulare principi validi per l’intera umanità."]], "anthology": [["Montesquieu", "Lo spirito delle leggi", "Libertà e separazione dei poteri", "Permette di distinguere moderazione storica e schemi moderni."], ["Rousseau", "Il contratto sociale", "Sovranità e volontà generale", "Interroga rappresentanza e bene comune."], ["Mary Wollstonecraft", "Rivendicazione dei diritti della donna", "Educazione e uguaglianza", "Usa l’universalismo contro una sua esclusione."]], "questions": ["Quale problema politico affronta Montesquieu e quale Rousseau?", "Perché il dispotismo illuminato è una formula ambivalente?", "L’universalismo è una conquista o una promessa incompleta?"], "map": ["Politica dei Lumi", ["moderazione", "sovranità", "società commerciale", "riforme dall’alt za dell’essere umano non si esaurisce nel calcolo razionale.</p>\n<p>I Lumi elaborarono linguaggi di tolleranza, utilità, felicità pubblica, diritti e sovranità, ma continuarono a convivere con esclusioni di genere, dominio coloniale e gerarchie sociali. Proprio per questo la loro eredità non è pacificata. L’autonomia e l’universalismo restano promesse da verificare, non conquiste definitivamente possedute.</p>\n<p>Nel 1784 Kant definì l’Illuminismo come uscita dell’essere umano da una minorità di cui egli stesso è responsabile e collegò tale uscita all’uso pubblico della ragione. La formula è diventata emblematica, ma va letta come una risposta storica situata. Non racchiude tutto il secolo; ne esprime con forza una domanda ancora attuale: abbiamo il coraggio di sottoporre al giudizio ciò che abbiamo ricevuto?</p>\n<aside class=\"callout note\"><span class=\"callout-label\">In una frase</span><p>Il mondo umano può essere conosciuto criticamente, discusso pubblicamente e riformato; ma i soggetti ammessi alla conoscenza, alla discussione e alla riforma non furono ancora tutti.</p></aside>", "tools": {"summary": "L’eredità dei Lumi consiste nell’intreccio fra conoscenza, comunicazione e riforma. Autonomia, critica e universalità non sono possessi definitivi, ma pratiche da verificare anche contro le esclusioni prodotte dal secolo.", "essentials": ["La critica deve essere pubblica e argomentata.", "La letteratura forma un lettore partecipe.", "Diritti e universalismo restano aperti al conflitto e alla revisione."], "vocab": [["Autonomia", "Capacità di usare il proprio giudizio senza dipendere passivamente dall’autorità."], ["Uso pubblico della ragione", "Argomentazione rivolta alla comunità dei lettori."], ["Eredità", "Problema ancora attivo, non semplice elenco di conquiste."]], "anthology": [["Immanuel Kant", "Che cos’è l’Illuminismo?", "La minorità e il coraggio di sapere", "Chiude il percorso riaprendo la domanda sull’autonomia."]], "questions": ["Qual è il legame stampa ne prepararono lo sviluppo.</td></tr><tr><td>3</td><td>La ragione illuministica è soprattutto esame critico e pubblico; esperienza, passioni e sentimento non ne sono esclusi.</td></tr><tr><td>4</td><td>Progresso e perfettibilità non furono dogmi condivisi: Rousseau ne mostrò le ambivalenze.</td></tr><tr><td>5</td><td>L’Illuminismo comprende deismo, scetticismo, materialismo, ateismo e riformismi religiosi.</td></tr><tr><td>6</td><td>Periodici, caffè, salons, teatri e società di lettura costruirono nuovi pubblici, ancora socialmente selettivi.</td></tr><tr><td>7</td><td>L’Encyclopédie fu un’impresa editoriale e civile composta da testi e tavole, attenta anche alle arti e ai mestieri.</td></tr><tr><td>8</td><td>La letteratura dei Lumi usa straniamento, ironia, racconto filosofico, dialogo, saggio periodico, romanzo epistolare, teatro e autobiografia.</td></tr><tr><td>9</td><td>Montesquieu pensa la moderazione; Rousseau la sovranità e la volontà generale; Smith la morale e la società commerciale.</td></tr><tr><td>10</td><td>I Lumi offrirono linguaggi alle rivoluzioni, ma non le causarono meccanicamente.</td></tr><tr><td>11</td><td>Universalismo ed esclusioni di genere, razza e condizione sociale convissero in modo conflittuale.</td></tr><tr><td>12</td><td>L’eredità dei Lumi resta aperta perché autonomia, critica e universalità devono essere continuamente verificate.</td></tr></tbody></table></div>\n<h2>Vocabolario essenziale</h2>\n<div class=\"table-wrap\"><table><thead><tr><th><strong>Termine</strong></th><th><strong>Definizione</strong></th></tr></thead><tbody><tr><td>Illuminismo</td><td>Fenomeno culturale europeo settecentesco fondato sulla critica pubblica e sull’utilità del sapere.</td></tr><tr><td>Philosophe</td><td>Intellettuale che interviene sui problemi civili attraverso differenti forme di scrittura.</td></tr><tr><td>Ragione critica</td><td>Facoltà di esaminare affermazioni, tradizioni e istituzioni mediante argomenti e confronto.</td></tr><tr><td>Empirismo</td><td>Orientamento che attribuisce all’esperienza un ruolo decisivo nella conoscenza.</td></tr><tr><td>Tolleranza</td><td>Limitazione della coercizione sulle coscienze; non coincide necessariamente con piena uguaglianza.</td></tr><tr><td>Deismo</td><td>Fede in un Dio conoscibile attraverso ragione e natura, indipendente da dogmi particolari.</td></tr><tr><td>Progresso</td><td>Possibilità di miglioramento delle conoscenze e delle condizioni umane.</td></tr><tr><td>Perfettibilità</td><td>Capacità umana di trasformarsi, con esiti sia positivi sia negativi.</td></tr><tr><td>Opinione pubblica</td><td>Insieme di giudizi e pratiche discorsive reso possibile da stampa e sociabilità.</td></tr><tr><td>Enciclopedismo</td><td>Organizzazione sistematica e diffusione dei saperi, comprese arti e tecniche.</td></tr><tr><td>Cosmopolitismo</td><td>Ideale di appartenenza a una comunità umana più ampia dei singoli Stati.</td></tr><tr><td>Felicità pubblica</td><td>Benessere collettivo assunto come criterio di governo e riforma.</td></tr><tr><td>Straniamento</td><td>Tecnica che rende insolito ciò che appare abituale per permetterne la critica.</td></tr><tr><td>Racconto filosofico</td><td>Narrazione breve che mette alla prova idee mediante viaggio, paradosso e ironia.</td></tr><tr><td>Dispotismo illuminato</td><td>Categoria storiografica per alcune riforme promosse da monarchi assoluti.</td></tr></tbody></table></div>\n<h2>Cronologia essenziale</h2>\n<div class=\"table-wrap\"><table><thead><tr><th><strong>Data</strong></th><th><strong>Evento o opera</strong></th></tr></thead><tbody><tr><td>1687</td><td>Newton, Principi matematici della filosofia naturale</td></tr><tr><td>1689–1690</td><td>Locke: tolleranza, governo ed esperienza</td></tr><tr><td>1697</td><td>Bayle, Dizionario storico e critico</td></tr><tr><td>1711–1712</td><td>Addison e Steele, The Spectator</td></tr><tr><td>1721</td><td>Montesquieu, Lettere persiane</td></tr><tr><td>1748</td><td>Montesquieu, Lo spirito delle leggi</td></tr><tr><td>1751–1772</td><td>Pubblicazione dell’Encyclopédie</td></tr><tr><td>1755</td><td>Rousseau, Discorso sulla disuguaglianza; terremoto di Lisbona</td></tr><tr><td>1759</td><td>Voltaire, Candido; Smith, Teoria dei sentimenti morali</td></tr><tr><td>1761–1762</td><td>Rousseau: La nuova Eloisa, Contratto sociale ed Emilio</td></tr><tr><td>1779</td><td>Lessing, Nathan il saggio</td></tr><tr><td>1784</td><td>Kant, Risposta alla domanda: che cos’è l’Illuminismo?</td></tr></tbody></table></div>\n<h2>Guida allo studio</h2>\n<h3>Comprendere</h3>\n<ul class=\"source-list\">\n<li>Perché l’Illuminismo non può essere considerato una dottrina unica?</li>\n<li>Quale funzione ebbero Newton, Locke e Bayle nella formazione della cultura settecentesca?</li>\n<li>In quale senso la ragione illuministica è una ragione critica?</li>\n<li>Perché Rousseau può essere considerato un critico interno dei Lumi?</li>\n<li>Quali differenti posizioni religiose convivono nell’Illuminismo?</li>\n<li>Come nacque l’opinione pubblica e quali furono i suoi limiti?</li>\n<li>Perché le tavole dell’Encyclopédie sono culturalmente importanti?</li>\n<li>In che modo lo straniamento produce critica nelle Lettere persiane?</li>\n<li>Quali differenze esistono tra racconto filosofico e dialogo filosofico?</li>\n<li>Perché il rapporto tra Illuminismo e rivoluzioni non è lineare?</li>\n</ul>\n<h3>Collegare e interpretare</h3>\n<ul class=\"source-list\">\n<li>Confronta Montesquieu e Rousseau: quale problema politico affronta ciascuno?</li>\n<li>Metti in relazione censura e uso di forme letterarie indirette.</li>\n<li>Spiega perché sentimento e ragione non devono essere opposti meccanicamente.</li>\n<li>Confronta la funzione del lettore in Candido e nel Nipote di Rameau.</li>\n<li>L’universalismo illuministico è una conquista o una promessa incompleta? Argomenta.</li>\n</ul>\n<h3>Preparare l’esposizione orale</h3>\n<aside class=\"callout activity\"><span class=\"callout-label\">Traccia</span><p>Definisci l’Illuminismo; presenta le sue radici; spiega ragione, esperienza e utilità; descrivi i nuovi pubblici; illustra almeno tre generi letterari e tre aree europee; concludi discutendo un limite dell’universalismo dei Lumi.</p></aside>\n<h3>Laboratorio delle fonti</h3>\n<div class=\"table-wrap\"><table><thead><tr><th><strong>Attività</strong></th><th><strong>Consegna</strong></th></tr></thead><tbody><tr><td>Fonte filosofica</td><td>Kant: minorità e uso pubblico della ragione.</td></tr><tr><td>Fonte letteraria</td><td>Voltaire o Montesquieu: riconoscere ironia e straniamento.</td></tr><tr><td>Fonte visuale</td><td>Una tavola dell’Encyclopédie: ricostruire un processo di lavoro.</td></tr><tr><td>Confronto politico</td><td>Montesquieu e Rousseau: moderazione e sovranità.</td></tr><tr><td>Questione storiografica</td><td>Un Illuminismo o molti Illuminismi?</td></tr><tr><td>Compito autentico</td><td>Scrivere un breve articolo settecentesco contro un pregiudizio contemporaneo, distinguendo contesto storico e attualizzazione.</td></tr></tbody></table></div>", "tools": null}, {"id": "europeo-rimandi-alla-parte-antologica", "title": "Rimandi alla parte antologica", "kind": "anthology", "body": "<div class=\"table-wrap\"><table><thead><tr><th><strong>Autore</strong></th><th><strong>Opera</strong></th><th><strong>Nucleo di lettura</strong></th></tr></thead><tbody><tr><td>Montesquieu</td><td>Lettere persiane</td><td>Straniamento e critica dei costumi</td></tr><tr><td>Voltaire</td><td>Candido</td><td>Ironia, male e responsabilità</td></tr><tr><td>Diderot</td><td>Il nipote di Rameau</td><td>Dialogo e polifonia</td></tr><tr><td>Rousseau</td><td>Discorso sulla disuguaglianza</td><td>Proprietà, società e perfettibilità</td></tr><tr><td>Rousseau</td><td>La nuova Eloisa / Confessioni</td><td>Sentimento e costruzione dell’io</td></tr><tr><td>Lessing</td><td>Nathan il saggio</td><td>Tolleranza e teatro delle idee</td></tr><tr><td>Kant</td><td>Che cos’è l’Illuminismo?</td><td>Autonomia e uso pubblico della ragione</td></tr><tr><td>Wollstonecraft</td><td>Rivendicazione dei diritti della donna</td><td>Universalismo ed esclusione</td></tr><tr><td>Diderot e d’Alembert</td><td>Encyclopédie</td><td>Testo, immagine, sapere e lavoro</td></tr></tbody></table></div>", "tools": null}, {"id": "europeo-bibliografia-essenziale-per-il-docente", "title": "Bibliografia essenziale per il docente", "kind": "biblio", "body": "<ul class=\"source-list\">\n<li>Bell, David A., “For a New Social History of the Enlightenment: Authors, Readers, and Commercial Capitalism”, Modern Intellectual History, 2023.</li>\n<li>Brewer, Daniel (a cura di), The Cambridge Companion to the French Enlightenment, Cambridge University Press, 2014.</li>\n<li>De Dijn, Anne, “The Politics of Enlightenment: From Peter Gay to Jonathan Israel”, The Historical Journal, 2012.</li>\n<li>Ferrone, Vincenzo, Il mondo dell’Illuminismo. Storia di una rivoluzione culturale, Einaudi, 2019.</li>\n<li>Ferrone, Vincenzo; Roche, Daniel (a cura di), L’Illuminismo. Dizionario storico, Laterza.</li>\n<li>Melton, James Van Horn, The Rise of the Public in Enlightenment Europe, Cambridge University Press, 2001.</li>\n<li>Munck, Thomas, Conflict and Enlightenment: Print and Political Culture in Europe, 1635–1795, Cambridge University Press.</li>\n<li>Outram, Dorinda, The Enlightenment, Cambridge University Press.</li>\n<li>Sebastiani, Silvia, The Scottish Enlightenment: Race, Gender, and the Limits of Progress, Palgrave Macmillan, 2013.</li>\n<li>Sorkin, David, The Religious Enlightenment, Princeton University Press, 2008.</li>\n<li>Venturi, Franco, Settecento riformatore, Einaudi, più volumi.</li>\n<li>ARTFL Encyclopédie, University of Chicago: edizione digitale dell’Encyclopédie.</li>\n<li>Gallica, Bibliothèque nationale de France: testi e dossier digitali sulle opere francesi dei Lumi.</li>\n<li>Stanford Encyclopedia of Philosophy: voci Enlightenment, Newton’s Philosophy, Émilie du Châtelet e Mary Wollstonecraft.</li>\n</ul>\n<p>Nota editoriale: la scelta puntuale delle traduzioni italiane e delle pagine antologiche sarà fissata durante la preparazione della seconda parte del volume. Le indicazioni presenti in questo capitolo identificano opere e nuclei, non autorizzano ancora la riproduzione di una specifica edizione.</p>", "tools": null}]}, {"id": "italiano", "title": "L’Illuminismo italiano", "subtitle": "Prosa civile, riforme e pubblica felicità", "question": "Può una cultura politicamente frammentata diventare uno dei laboratori europei della modernità?", "lessons": [{"id": "italiano-apertura-tre-italie-dei-lumi", "title": "Apertura · Tre Italie dei Lumi", "kind": "main", "body": "<p>L’Italia del Settecento non era uno Stato. Era una penisola divisa in regni, repubbliche, granducati e territori soggetti a dinastie straniere. Non possedeva un governo comune, un mercato pienamente unificato o una lingua parlata dalla maggioranza della popolazione. Eppure proprio questa frammentazione produsse laboratori diversi, capaci di dialogare con l’Europa e di affrontare problemi concreti: fisco, giustizia, commercio, feudalità, istruzione, amministrazione, rapporti fra Stato e Chiesa.</p>\n<p>Milano, Napoli e la Toscana non elaborarono lo stesso Illuminismo. A Milano un gruppo di giovani aristocratici trasformò il periodico in strumento di discussione civile e collegò scrittura, economia e diritto. A Napoli l’insegnamento universitario e i grandi trattati costruirono un’idea di economia civile fondata su fiducia, reciprocità ed educazione. In Toscana il governo di Pietro Leopoldo tradusse alcune istanze illuministiche in provvedimenti amministrativi e legislativi, culminati nella riforma penale del 1786.</p>\n<p>Queste esperienze non furono copie provinciali dei Lumi francesi. Ricevettero idee dall’Europa, ma le rielaborarono a partire dalle condizioni italiane. L’economia civile di Genovesi non coincide con la scienza economica britannica; <em>Il Caffè</em> riprende il modello del periodico inglese, ma lo adatta alla battaglia contro il pedantismo e all’esigenza di una lingua moderna; Beccaria partecipa al dibattito europeo sul diritto, ma produce uno dei libri italiani più influenti del secolo.</p>\n<p>Il tratto comune non è una dottrina. È la volontà di trasformare il sapere in intervento. Gli illuministi italiani scrivono per modificare leggi, amministrazioni, comportamenti e linguaggi. Sono spesso funzionari, professori, giuristi o consiglieri dei sovrani. Questo rapporto con il potere rende possibile la riforma, ma ne costituisce anche il limite: il cambiamento dipende dall’iniziativa di governi autoritari e rimane affidato a minoranze colte.</p>\n<aside class=\"callout note\"><span class=\"callout-label\">Idea Centrale</span><p>L’Illuminismo italiano è una costellazione di centri riformatori: policentrico, concreto, legato a diritto, economia, amministrazione e nuova comunicazione civile.</p></aside>", "tools": {"summary": "La frammentazione politica italiana produce laboratori differenti e comunicanti. Milano, Napoli e Toscana trasformano idee europee in progetti concreti di riforma; la vicinanza ai governi rende possibile l’intervento ma ne limita autonomia e partecipazione.", "essentials": ["L’Italia settecentesca non è uno Stato unitario.", "Milano, Napoli e Toscana elaborano forme diverse di Illuminismo.", "Il tratto comune è trasformare il sapere in intervento.", "Il rapporto con i governi è insieme possibilità e limite."], "vocab": [["Policentrismo", "Presenza di più centri autonomi collegati."], ["Riformismo", "Trasformazione graduale delle istituzioni senza rovesciamento rivoluzionario."], ["Prosa civile", "Scrittura orientata alla discussione pubblica e alla riforma."]], "anthology": [["Pietro Verri", "Meditazioni sulla felicità", "La pubblica felicità", "Introduce il criterio civile del riformismo milanese."], ["Antonio Genovesi", "Lezioni di commercio", "Economia civile", "Mostra l’originalità napoletana."], ["Pietro Leopoldo", inare un movimento nazionale già unitario.</p>\n<p>La frammentazione ostacolava la circolazione di merci, persone e libri, ma permetteva anche sperimentazioni differenti. Un’idea respinta in uno Stato poteva trovare accoglienza in un altro. Intellettuali, funzionari ed editori attraversavano i confini; le opere venivano stampate dove la censura era meno rigida. <em>Il Caffè</em>, periodico milanese, fu stampato a Brescia, in territorio veneziano, per sottrarsi al controllo austriaco. <em>Dei delitti e delle pene</em> uscì anonimo a Livorno.</p>\n<p>Il panorama italiano assomigliava dunque a un arcipelago. I centri comunicavano fra loro e con l’Europa, ma ciascuno affrontava problemi specifici. Milano era inserita nell’amministrazione riformatrice asburgica; Napoli doveva confrontarsi con feudalità, squilibri territoriali e debolezza delle istituzioni; in Toscana il granduca controllava direttamente la macchina del governo.</p>\n<h2>2. Riformare senza rivoluzione</h2>\n<p>Gli illuministi italiani operarono soprattutto entro l’orizzonte del riformismo. Non miravano generalmente a rovesciare la monarchia, ma a renderne l’azione più razionale e utile: semplificare il fisco, limitare privilegi, migliorare l’istruzione, rendere più umana la giustizia, favorire commercio e agricoltura. Il destinatario delle loro proposte era spesso il sovrano o l’amministrazione.</p>\n<p>Questa posizione non fu servile per definizione. Collaborare con il governo poteva offrire strumenti concreti di intervento. Pietro Verri ricoprì incarichi nell’amministrazione lombarda; Beccaria divenne funzionario; Genovesi insegnò in una cattedra destinata a formare una nuova cultura economica; Filangieri cercò interlocutori nella monarchia borbonica. Ma la collaborazione imponeva prudenza, autocensura e compromessi. Alcuni testi di Verri rimasero inediti proprio perché avrebbero colpito istituzioni con cui l’autore doveva continuare a lavorare.</p>\n<p>Il riformismo entrò in crisi quando i governi rallentarono il cambiamento o quando la Rivoluzione francese modificò l’orizzonte politico. A Napoli una parte degli intellettuali passò dalla richiesta di riforme alla partecipazione rivoluzionaria del 1799. Non si trattò però di uno sviluppo inevitabile: riforma e rivoluzione restano esperienze distinte.</p>\n<aside class=\"callout warning\"><span class=\"callout-label\">Errore Da Evitare</span><p>Gli illuministi italiani non furono tutti rivoluzionari mancati. Per molti di loro la monarchia riformatrice era una scelta politica positiva, non soltanto un ripiego imposto dalla censura.</p></aside>\n<h2>3. Stato, Chiesa e giurisdizionalismo</h2>\n<p>In Italia la Chiesa non fu semplicemente l’avversario esterno dei Lumi. Numerosi protagonisti erano ecclesiastici: Antonio Genovesi era sacerdote, Ferdinando Galiani abate. Esistevano cattolici illuminati che volevano riformare istruzione, pratiche religiose e istituzioni senza abbandonare la fede.</p>\n<p>Un concetto essenziale è il <strong>giurisdizionalismo</strong>: la tendenza degli Stati a limitare privilegi e competenze temporali della Chiesa, sottoponendo al controllo pubblico proprietà, tribunali, scuole e istituzioni assistenziali. Questa politica poteva essere sostenuta da motivazioni illuministiche, amministrative o dinastiche. In Toscana le riforme ecclesiastiche di Pietro Leopoldo incontrarono forti resistenze; a Napoli la politica di Bernardo Tanucci cercò di rafforzare lo Stato nei confronti dei poteri religiosi.</p>\n<p>Parlare di laicità italiana nello stesso senso della polemica francese sarebbe quindi impreciso. Il fenomeno comprende critica dell’autorità ecclesiastica, razionalizzazione delle istituzioni e tentativi di riforma interna del cattolicesimo.</p>\n<aside class=\"callout keyword\"><span class=\"callout-label\">Parola Chiave Giurisdizionalismo</span><p>Politica con cui lo Stato rivendica la propria autorità sugli aspetti temporali della vita ecclesiastica. Non equivale necessariamente ad anticlericalismo o irreligiosità.</p></aside>\n<h2>4. Milano, Napoli e Toscana a confronto</h2>\n<div class=\"table-wrap\"><table><thead><tr><th><strong>Centro</strong></th><th><strong>Contesto</strong></th><th><strong>Tema dominante</strong></th><th><strong>Forme e istituzioni</strong></th><th><strong>Risultati e limiti</strong></th></tr></thead><tbody><tr><td>Milano</td><td>Lombardia asburgica</td><td>Pubblica felicità, economia e giustizia</td><td>Accademia dei Pugni, <em>Il Caffè</em>, amministrazione</td><td>Grande influenza europea; dipendenza dal governo e dissidi interni</td></tr><tr><td>Napoli</td><td>Monarchia borbonica</td><td>Economia civile e legislazione</td><td>Università, cattedra di commercio, trattati</td><td>Scuola originale e transnazionale; scarsa applicazione di molte proposte</td></tr><tr><td>Toscana</td><td>Granducato lorenese</td><td>Governo e riforma legislativa</td><td>Amministrazione, accademie, codici</td><td>Leopoldina del 1786; riforme parziali, contestate o interrotte</td></tr></tbody></table></div>\n<p>Venezia e Parma furono altri centri importanti di circolazione culturale, ma non devono trasformare il capitolo in una rassegna di Stati. La struttura fondamentale rimane triangolare: Milano produce soprattutto giornalismo e prosa civile; Napoli economia e scienza della legislazione; Toscana riforma di governo.</p>", "tools": {"summary": "L’Illuminismo italiano è un arcipelago di Stati e centri. Gli intellettuali scelgono soprattutto il riformismo monarchico; il giurisdizionalismo limita i poteri temporali della Chiesa senza coincidere necessariamente con irreligiosità.", "essentials": ["La frammentazione ostacola ma permette sperimentazioni differenti.", "Riforma e rivoluzione sono esperienze distinte.", "Collaborare con il governo non equivale automaticamente a servilismo.", "Il cattolicesimo illuminato appartiene pienamente al fenomeno italiano."], "vocab": [["Giurisdizionalismo", "Politica con cui lo Stato limita le competenze temporali della Chiesa."], ["Cattolicesimo illuminato", "Tentativo di conciliare fede, ragione e riforma."], ["Autocensura", "Limitazione preventiva della propria espressione per evitare sanzioni."], ["Arcipelago", "Metafora di centri separati ma collegati."]], "anthology": [["Pietro Verri", "Meditazioni sulla felicità", "Il fine del governo", "Fa vedere il riformismo come scelta positiva."], ["Gaetano Filangieri", "Scienza della legislazione", "Introduzione", "Collega leggi, contesto e felicità dei cittadini."]], "questions": ["In che senso la frammentazione può favorire esperimenti?", "Perché gli illuministi italiani non sono “rivoluzionari mancati”?", "Qual è la differenza tra giurisdizionalismo e anticlericalismo?"], "map": ["Geografia delle riforme", ["Stati frammentati", "riforma senza rivoluzione", "intellettuali-funzionari", "Stato e Chiesa", "Milano–Napoli–Toscana"]], "gbprof": "Riformare senza rovesciare: la scelta politica degli illuministi italiani", "mapFile": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjAwIiBoZWlnaHQ9IjcyMCIgdmlld0JveD0iMCAwIDEyMDAgNzIwIiByb2xlPSJpbWciIGFyaWEtbGFiZWxsZWRieT0idGl0bGUgZGVzYyI+Cjx0aXRsZSBpZD0idGl0bGUiPk1hcHBhIGNvbmNldHR1YWxlOiBHZW9ncmFmaWEgZGVsbGUgcmlmb3JtZTwvdGl0bGU+PGRlc2MgaWQ9ImRlc2MiPkdlb2dyYWZpYSBkZWxsZSByaWZvcm1lIGNvbGxlZ2F0byBhIFN0YXRpIGZyYW1tZW50YXRpLCByaWZvcm1hIHNlbnphIHJpdm9sdXppb25lLCBpbnRlbGxldHR1YWxpLWZ1bnppb25hcmksIFN0YXRvIGUgQ2hpZXNhLCBNaWxhbm/igJNOYXBvbGnigJNUb3NjYW5hPC9kZXNjPgo8ZGVmcz48bWFya2VyIGlkPSJhcnJvdyIgbWFya2VyV2lkdGg9IjEwIiBtYXJrZXJIZWlnaHQ9IjEwIiByZWZYPSI4IiByZWZZPSIzIiBvcmllbnQ9ImF1dG8iIG1hcmtlclVuaXRzPSJzdHJva2VXaWR0aCI+PHBhdGggZD0iTTAsMCBMMCw2IEw5LDMgeiIgZmlsbD0iIzY5ODE3ZiIvPjwvbWFya2VyPjxmaWx0ZXIgaWQ9InNoYWRvdyIgeD0iLTIwJSIgeT0iLTIwJSIgd2lkdGg9IjE0MCUiIGhlaWdodD0iMTQwJSI+PGZlRHJvcFNoYWRvdyBkeD0iMCIgZHk9IjUiIHN0ZERldmlhdGlvbj0iOCIgZmxvb2Qtb3BhY2l0eT0iLjEzIi8+PC9maWx0ZXI+PC9kZWZzPgo8cmVjdCB3aWR0aD0iMTIwMCIgaGVpZ2h0PSI3MjAiIHJ4PSIzNiIgZmlsbD0iI2Y3ZjNlOCIvPgo8d
